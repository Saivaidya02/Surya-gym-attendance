      })()}

      {/* LEAVE */}
      {portalTab==="leave"&&(
        <LeaveTab staff={staff} leaveReqs={myLeaves} showToast={showToast}
          onApprove={onApprove} onReject={onReject}
          restrictToEmp={emp.id}
        />
      )}
    </div>
  );
}


/* ── EXPORT TAB ── */
function ExportTab({allDates, staff, salaryConfig, gymId, gymName}){
  const now = new Date();
  const [viewYear,  setViewYear]  = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());
  const [allData,   setAllData]   = useState({});
  const [loading,   setLoading]   = useState(false);
  const [exporting, setExporting] = useState("");
  const [preview,   setPreview]   = useState(null);

  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const monthKey = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}`;
  const monthLabel = `${MONTHS[viewMonth]} ${viewYear}`;

  useEffect(()=>{
    const mDates = allDates.filter(d=>d.startsWith(monthKey));
    if(!mDates.length){setAllData({});setPreview(null);return;}
    setLoading(true);
    Promise.all(mDates.map(d=>window._loadAttendance(d).then(data=>[d,data]))).then(results=>{
      const map={};results.forEach(([d,data])=>{if(data)map[d]=data;});
      setAllData(map);
      setLoading(false);
      buildPreview(map);
    });
  },[viewYear,viewMonth,allDates]);

  const calcEmpStats = (empId, data) => {
    let p=0,a=0,h=0,l=0,totalMins=0;
    Object.values(data).forEach(day=>{
      const s=(day?.statuses||{})[empId];
      const pin=(day?.punchIn||{})[empId];
      const pout=(day?.punchOut||{})[empId];
      if(s==="Present"||s==="Half Day") p++;
      if(s==="Absent") a++;
      if(s==="Half Day") h++;
      if(s==="Leave") l++;
      if(pin&&pout){
        const pt=t=>{const[tm,ap]=t.split(" ");const[hh,mm]=(tm||"00:00").split(":").map(Number);let hr=hh;if(ap==="PM"&&hh!==12)hr+=12;if(ap==="AM"&&hh===12)hr=0;return hr*60+mm;};
        const d=pt(pout)-pt(pin); if(d>0)totalMins+=d;
      }
    });
    const salary = parseFloat(salaryConfig[empId])||0;
    const workDays = 26;
    const perDay = workDays>0?salary/workDays:0;
    const net = Math.max(0, salary - a*perDay);
    return{p,a,h,l,totalMins,salary,net,rate:((p+l)>0?Math.round(p/(p+a+l)*100):0)};
  };

  const buildPreview = (data) => {
    const rows = staff.map(emp=>{
      const s = calcEmpStats(emp.id, data);
      return {
        name: emp.name, role: emp.role, shift: emp.shift,
        present: s.p, absent: s.a, halfDay: s.h, leave: s.l,
        hours: `${Math.floor(s.totalMins/60)}h ${s.totalMins%60}m`,
        rate: s.rate+"%",
        salary: s.salary>0?"₹"+Math.round(s.net).toLocaleString("en-IN"):"—"
      };
    });
    setPreview(rows);
  };

  // ── EXCEL EXPORT ──
  const exportExcel = async () => {
    setExporting("excel");
    try {
      const mDates = Object.keys(allData).sort();
      const wb = XLSX.utils.book_new();

      // Sheet 1: Monthly Summary
      const summaryData = [
        ["SURYA GYM 2.0 - ATTENDANCE REPORT", "", "", "", "", "", "", ""],
        [`Month: ${monthLabel}`, "", `Generated: ${new Date().toLocaleDateString("en-IN")}`, "", "", "", "", ""],
        [""],
        ["Employee","Role","Shift","Present","Absent","Half Day","Leave","Hours Worked","Attend %","Net Salary"],
        ...staff.map(emp=>{
          const s=calcEmpStats(emp.id,allData);
          return[emp.name,emp.role,emp.shift,s.p,s.a,s.h,s.l,
            `${Math.floor(s.totalMins/60)}h ${s.totalMins%60}m`,
            s.rate+"%",
            s.salary>0?Math.round(s.net):""
          ];
        })
      ];
      const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
      ws1["!cols"] = [{wch:20},{wch:14},{wch:22},{wch:9},{wch:9},{wch:10},{wch:8},{wch:14},{wch:10},{wch:12}];
      ws1["A1"].s = {font:{bold:true,sz:14},fill:{fgColor:{rgb:"FF4D00"}}};
      XLSX.utils.book_append_sheet(wb, ws1, "Monthly Summary");

      // Sheet 2: Day-by-day attendance
      const dayHeaders = ["Date",...staff.map(e=>e.name),...staff.map(e=>e.name+" (Punch In)"),...staff.map(e=>e.name+" (Punch Out)")];
      const dayRows = mDates.map(d=>{
        const day=allData[d]||{};
        return[
          fmtDate(d),
          ...staff.map(e=>(day.statuses||{})[e.id]||"—"),
          ...staff.map(e=>(day.punchIn||{})[e.id]||"—"),
          ...staff.map(e=>(day.punchOut||{})[e.id]||"—"),
        ];
      });
      const ws2 = XLSX.utils.aoa_to_sheet([dayHeaders,...dayRows]);
      ws2["!cols"] = [{wch:22},...staff.map(()=>({wch:14})),...staff.map(()=>({wch:14})),...staff.map(()=>({wch:14}))];
      XLSX.utils.book_append_sheet(wb, ws2, "Day-by-Day");

      // Sheet 3: Payroll
      const payData = [
        ["SURYA GYM 2.0 - PAYROLL REPORT","","","","",""],
        [`Month: ${monthLabel}`,"","","","",""],
        [""],
        ["Employee","Monthly Salary","Present Days","Absent Days","Deduction","Net Salary"],
        ...staff.map(emp=>{
          const s=calcEmpStats(emp.id,allData);
          const perDay=s.salary>0?s.salary/26:0;
          return[emp.name,s.salary>0?s.salary:"Not set",s.p,s.a,s.salary>0?Math.round(s.a*perDay):"",s.salary>0?Math.round(s.net):""];
        }),
        [""],
        ["TOTAL","",staff.reduce((t,e)=>t+calcEmpStats(e.id,allData).p,0),staff.reduce((t,e)=>t+calcEmpStats(e.id,allData).a,0),"",
          staff.reduce((t,e)=>{const s=calcEmpStats(e.id,allData);return t+(s.salary>0?Math.round(s.net):0);},0)]
      ];
      const ws3 = XLSX.utils.aoa_to_sheet(payData);
      ws3["!cols"] = [{wch:20},{wch:16},{wch:14},{wch:14},{wch:14},{wch:14}];
      XLSX.utils.book_append_sheet(wb, ws3, "Payroll");

      XLSX.writeFile(wb, `SuryaGym_${monthLabel.replace(" ","_")}.xlsx`);
    } catch(e){ console.error(e); alert("Export failed: "+e.message); }
    setExporting("");
  };

  // ── PDF EXPORT ──
  const exportPDF = async () => {
    setExporting("pdf");
    try {
      const {jsPDF} = window.jspdf;
      const doc = new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
      const mDates = Object.keys(allData).sort();

      // ── Page 1: Monthly Attendance Summary ──
      doc.setFillColor(8,12,16);
      doc.rect(0,0,297,210,"F");

      // Header bar
      doc.setFillColor(255,77,0);
      doc.rect(0,0,297,18,"F");
      doc.setTextColor(255,255,255);
      doc.setFontSize(14);
      doc.setFont("helvetica","bold");
      doc.text("SURYA GYM 2.0  —  MONTHLY ATTENDANCE REPORT",14,12);
      doc.setFontSize(9);
      doc.text(monthLabel+"  |  Generated: "+new Date().toLocaleDateString("en-IN"),200,12,"right");

      // Summary table
      const summaryBody = staff.map(emp=>{
        const s=calcEmpStats(emp.id,allData);
        return[emp.name,emp.role,emp.shift,String(s.p),String(s.a),String(s.h),String(s.l),
          `${Math.floor(s.totalMins/60)}h ${s.totalMins%60}m`,s.rate+"%",
          s.salary>0?"Rs."+Math.round(s.net).toLocaleString("en-IN"):"—"];
      });

      doc.autoTable({
        startY:24,
        head:[["Employee","Role","Shift","Present","Absent","Half","Leave","Hours","Attend%","Net Salary"]],
        body:summaryBody,
        theme:"grid",
        styles:{fillColor:[13,17,23],textColor:[232,237,242],fontSize:9,cellPadding:4},
        headStyles:{fillColor:[255,77,0],textColor:[255,255,255],fontStyle:"bold",fontSize:9},
        alternateRowStyles:{fillColor:[20,25,35]},
        columnStyles:{0:{cellWidth:38},1:{cellWidth:22},2:{cellWidth:38},3:{cellWidth:16},4:{cellWidth:16},5:{cellWidth:14},6:{cellWidth:14},7:{cellWidth:20},8:{cellWidth:18},9:{cellWidth:26}},
        margin:{left:14,right:14}
      });

      // Stats box
      const totalPresent = staff.reduce((t,e)=>t+calcEmpStats(e.id,allData).p,0);
      const totalAbsent  = staff.reduce((t,e)=>t+calcEmpStats(e.id,allData).a,0);
      const totalPayroll = staff.reduce((t,e)=>{const s=calcEmpStats(e.id,allData);return t+(s.salary>0?Math.round(s.net):0);},0);
      const yPos = doc.lastAutoTable.finalY + 8;
      if(yPos < 180){
        const boxes=[["Total Present Days",String(totalPresent)],[" Total Absent Days",String(totalAbsent)],["Total Payroll",totalPayroll>0?"Rs."+totalPayroll.toLocaleString("en-IN"):"—"],["Days Recorded",String(mDates.length)]];
        boxes.forEach((b,i)=>{
          const x=14+i*68;
          doc.setFillColor(20,25,35); doc.roundedRect(x,yPos,62,18,2,2,"F");
          doc.setFillColor(255,77,0); doc.roundedRect(x,yPos,62,4,2,2,"F");
          doc.setTextColor(255,140,0); doc.setFontSize(14); doc.setFont("helvetica","bold");
          doc.text(b[1],x+31,yPos+13,"center");
          doc.setTextColor(107,114,128); doc.setFontSize(7); doc.setFont("helvetica","normal");
          doc.text(b[0].toUpperCase(),x+31,yPos+17.5,"center");
        });
      }

      // ── Page 2: Day-by-Day ──
      doc.addPage("a4","landscape");
      doc.setFillColor(8,12,16); doc.rect(0,0,297,210,"F");
      doc.setFillColor(255,77,0); doc.rect(0,0,297,18,"F");
      doc.setTextColor(255,255,255); doc.setFontSize(14); doc.setFont("helvetica","bold");
      doc.text("DAY-BY-DAY ATTENDANCE  —  "+monthLabel,14,12);

      const dayHead=[["Date",...staff.map(e=>e.name.split(" ")[0]),...staff.map(e=>e.name.split(" ")[0]+" In"),...staff.map(e=>e.name.split(" ")[0]+" Out")]];
      const dayBody=mDates.map(d=>{
        const day=allData[d]||{};
        const s=(e)=>(day.statuses||{})[e.id]||"—";
        const pin=(e)=>(day.punchIn||{})[e.id]||"—";
        const pout=(e)=>(day.punchOut||{})[e.id]||"—";
        return[new Date(d+"T00:00:00").toLocaleDateString("en-IN",{day:"2-digit",month:"short"}),...staff.map(s),...staff.map(pin),...staff.map(pout)];
      });
      doc.autoTable({
        startY:24,head:dayHead,body:dayBody,theme:"grid",
        styles:{fillColor:[13,17,23],textColor:[232,237,242],fontSize:8,cellPadding:3},
        headStyles:{fillColor:[255,77,0],textColor:[255,255,255],fontStyle:"bold",fontSize:8},
        alternateRowStyles:{fillColor:[20,25,35]},
        margin:{left:14,right:14}
      });

      // ── Pages 3+: Individual payslips ──
      staff.forEach(emp=>{
        const s=calcEmpStats(emp.id,allData);
        doc.addPage("a4","portrait");
        doc.setFillColor(8,12,16); doc.rect(0,0,210,297,"F");

        // Header
        doc.setFillColor(255,77,0); doc.rect(0,0,210,22,"F");
        doc.setTextColor(255,255,255); doc.setFontSize(16); doc.setFont("helvetica","bold");
        doc.text("SURYA GYM 2.0",14,10);
        doc.setFontSize(10); doc.setFont("helvetica","normal");
        doc.text("SALARY SLIP  —  "+monthLabel,14,17);
        doc.setFontSize(9); doc.text("Generated: "+new Date().toLocaleDateString("en-IN"),190,17,"right");

        // Employee info box
        doc.setFillColor(20,25,35); doc.roundedRect(14,28,182,28,3,3,"F");
        doc.setFillColor(255,77,0); doc.rect(14,28,4,28,"F");
        doc.setTextColor(232,237,242); doc.setFontSize(14); doc.setFont("helvetica","bold");
        doc.text(emp.name,24,38);
        doc.setFontSize(10); doc.setFont("helvetica","normal");
        doc.setTextColor(107,114,128);
        doc.text(emp.role+" · "+emp.shift,24,46);

        // Attendance stats
        doc.setTextColor(232,237,242); doc.setFontSize(11); doc.setFont("helvetica","bold");
        doc.text("ATTENDANCE",14,68);
        doc.setFillColor(255,77,0); doc.rect(14,70,40,1,"F");

        const attendStats=[["Present",String(s.p),"#00ff87"],[" Absent",String(s.a),"#ff4d6d"],["Half Day",String(s.h),"#ffd60a"],["Leave",String(s.l),"#a78bfa"]];
        attendStats.forEach((item,i)=>{
          const x=14+i*47;
          doc.setFillColor(20,25,35); doc.roundedRect(x,74,42,20,2,2,"F");
          doc.setTextColor(232,237,242); doc.setFontSize(16); doc.setFont("helvetica","bold");
          doc.text(item[1],x+21,87,"center");
          doc.setTextColor(107,114,128); doc.setFontSize(7); doc.setFont("helvetica","normal");
          doc.text(item[0].toUpperCase(),x+21,92,"center");
        });

        // Hours
        if(s.totalMins>0){
          doc.setFillColor(30,25,10); doc.roundedRect(14,100,182,14,2,2,"F");
          doc.setTextColor(255,214,10); doc.setFontSize(10); doc.setFont("helvetica","bold");
          doc.text("Total Hours Worked: "+Math.floor(s.totalMins/60)+"h "+s.totalMins%60+"m",14+8,109);
        }

        // Salary breakdown
        const sy = s.totalMins>0?120:106;
        doc.setTextColor(232,237,242); doc.setFontSize(11); doc.setFont("helvetica","bold");
        doc.text("SALARY BREAKDOWN",14,sy);
        doc.setFillColor(255,77,0); doc.rect(14,sy+2,60,1,"F");

        if(s.salary>0){
          const perDay=s.salary/26;
          const deduction=Math.round(s.a*perDay);
          const rows2=[
            ["Monthly Salary","Rs."+s.salary.toLocaleString("en-IN")],
            ["Per Day Rate (÷26 days)","Rs."+Math.round(perDay).toLocaleString("en-IN")],
            ["Absent Deduction ("+s.a+" days)","- Rs."+deduction.toLocaleString("en-IN")],
          ];
          doc.autoTable({
            startY:sy+6,
            body:rows2,
            theme:"plain",
            styles:{fillColor:[13,17,23],textColor:[156,163,175],fontSize:10,cellPadding:4},
            columnStyles:{0:{cellWidth:100},1:{cellWidth:80,halign:"right"}},
            margin:{left:14,right:14}
          });
          // Net salary box
          const ny=doc.lastAutoTable.finalY+4;
          doc.setFillColor(255,77,0,0.2); doc.setFillColor(20,35,20);
          doc.roundedRect(14,ny,182,20,3,3,"F");
          doc.setFillColor(0,255,135); doc.rect(14,ny,4,20,"F");
          doc.setTextColor(0,255,135); doc.setFontSize(11); doc.setFont("helvetica","bold");
          doc.text("NET SALARY",22,ny+8);
          doc.setFontSize(18);
          doc.text("Rs."+Math.round(s.net).toLocaleString("en-IN"),190,ny+14,"right");
          // Payment status reminder
          doc.setTextColor(107,114,128); doc.setFontSize(8); doc.setFont("helvetica","normal");
          doc.text("Attendance Rate: "+s.rate+"%  |  Surya Gym 2.0",14,ny+28);
        } else {
          doc.setTextColor(107,114,128); doc.setFontSize(10);
          doc.text("Salary not configured. Please set salary in the Payroll tab.",14,sy+14);
        }

        // Footer
        doc.setFillColor(20,20,20); doc.rect(0,283,210,14,"F");
        doc.setTextColor(55,65,81); doc.setFontSize(8);
        doc.text("Surya Gym 2.0  —  Staff Attendance & Payroll System",105,290,"center");
      });

      doc.save(`SuryaGym_${monthLabel.replace(" ","_")}.pdf`);
    } catch(e){ console.error(e); alert("PDF export failed: "+e.message); }
    setExporting("");
  };

  const recordedDays = Object.keys(allData).length;

  return(
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:"#4b5563",letterSpacing:2,fontFamily:"'Barlow',sans-serif",marginBottom:8}}>SELECT MONTH TO EXPORT</div>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:4}}>
          <button className="month-btn" onClick={()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);}}>← PREV</button>
          <div style={{flex:1,textAlign:"center",fontSize:20,fontWeight:900,letterSpacing:2}}>{monthLabel.toUpperCase()}</div>
          <button className="month-btn" onClick={()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);}}>NEXT →</button>
        </div>
        {loading
          ?<div style={{textAlign:"center",padding:"10px 0",color:"#6b7280",fontFamily:"'Barlow',sans-serif",fontSize:12}}>Loading data...</div>
          :<div style={{textAlign:"center",fontSize:12,color:recordedDays>0?"#00ff87":"#4b5563",fontFamily:"'Barlow',sans-serif"}}>{recordedDays>0?`✓ ${recordedDays} days recorded`:"No data for this month"}</div>
        }
      </div>

      {/* Export buttons */}
      <div className="export-card">
        <div style={{fontSize:13,fontWeight:700,letterSpacing:2,color:"#e8edf2",marginBottom:4}}>📊 EXCEL EXPORT</div>
        <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif",marginBottom:14}}>3 sheets: Monthly Summary · Day-by-Day · Payroll — Opens in Excel, Google Sheets</div>
        <button className="export-btn export-excel" onClick={exportExcel} disabled={!!exporting||recordedDays===0}>
          <span style={{fontSize:22}}>📗</span>
          <div>
            <div>{exporting==="excel"?"⏳ Generating Excel...":"DOWNLOAD EXCEL (.xlsx)"}</div>
            <div style={{fontSize:11,fontWeight:400,color:"rgba(0,196,84,0.6)",fontFamily:"'Barlow',sans-serif"}}>Attendance + Payroll + Day-by-Day</div>
          </div>
        </button>
      </div>

      <div className="export-card">
        <div style={{fontSize:13,fontWeight:700,letterSpacing:2,color:"#e8edf2",marginBottom:4}}>📄 PDF EXPORT</div>
        <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif",marginBottom:14}}>3 pages: Summary Report · Day-by-Day · Individual Salary Slips per employee</div>
        <button className="export-btn export-pdf" onClick={exportPDF} disabled={!!exporting||recordedDays===0}>
          <span style={{fontSize:22}}>📕</span>
          <div>
            <div>{exporting==="pdf"?"⏳ Generating PDF...":"DOWNLOAD PDF"}</div>
            <div style={{fontSize:11,fontWeight:400,color:"rgba(255,107,53,0.6)",fontFamily:"'Barlow',sans-serif"}}>Summary + Day-by-Day + Salary Slips</div>
          </div>
        </button>
      </div>

      {/* Preview table */}
      {preview&&preview.length>0&&(
        <div className="export-card">
          <div style={{fontSize:12,fontWeight:700,letterSpacing:2,color:"#6b7280",marginBottom:10}}>PREVIEW — {monthLabel.toUpperCase()}</div>
          <div className="preview-scroll">
            <table className="preview-table">
              <thead><tr>
                {["Employee","Role","Present","Absent","Half Day","Leave","Hours","Attend%","Net Salary"].map(h=><th key={h}>{h}</th>)}
              </tr></thead>
              <tbody>
                {preview.map((row,i)=>(
                  <tr key={i}>
                    <td style={{color:"#e8edf2",fontWeight:600}}>{row.name}</td>
                    <td>{row.role}</td>
                    <td style={{color:"#00ff87",fontWeight:700}}>{row.present}</td>
                    <td style={{color:"#ff4d6d",fontWeight:700}}>{row.absent}</td>
                    <td style={{color:"#ffd60a"}}>{row.halfDay}</td>
                    <td style={{color:"#a78bfa"}}>{row.leave}</td>
                    <td style={{color:"#ffd60a"}}>{row.hours}</td>
                    <td style={{color:"#ff8c00",fontWeight:700}}>{row.rate}</td>
                    <td style={{color:"#00ff87",fontWeight:700}}>{row.salary}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {recordedDays===0&&!loading&&(
        <div className="empty"><div style={{fontSize:42,marginBottom:12}}>📂</div><div style={{fontSize:16,letterSpacing:2}}>NO DATA FOR {monthLabel.toUpperCase()}</div><div style={{fontSize:12,color:"#4b5563",fontFamily:"'Barlow',sans-serif",marginTop:8}}>Mark attendance first, then export</div></div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('/service-worker.js').catch(()=>{}); });
}
</script>
</body>
</html>
