              <button key={title} onClick={()=>setAnnounce(tmpl)} style={{cursor:"pointer",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:7,padding:"8px 14px",textAlign:"left",fontFamily:"'Barlow',sans-serif",fontSize:12,color:"#6b7280",transition:"all 0.15s"}}>
                <span style={{color:"#e8edf2",fontWeight:700}}>{title}:</span> {tmpl.slice(0,60)}...
              </button>
            ))}
          </div>
          <button className="wa-bulk-btn" style={{width:"100%",justifyContent:"center",padding:"13px",fontSize:14}} onClick={sendBulkAnnounce}>
            📱 SEND TO ALL {activeMembers.length} ACTIVE MEMBERS
          </button>
        </div>
      </div>
    );
  }

  // ── ADD/EDIT FORM ──
  if(view==="add"){
    const pkg=PACKAGES.find(p=>p.name===form.package)||PACKAGES[0];
    const previewExpiry=form.startDate?calcExpiry(form.startDate,form.package,form.customDays):"";
    return(
      <div>
        <button onClick={()=>{setView("list");resetForm();setEditMode(false);}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:1,marginBottom:16,display:"flex",alignItems:"center",gap:6}}>← BACK</button>
        <div style={{background:"rgba(96,165,250,0.04)",border:"1px solid rgba(96,165,250,0.15)",borderRadius:12,padding:"20px"}}>
          <div style={{fontSize:16,fontWeight:900,letterSpacing:2,color:"#60a5fa",marginBottom:18}}>{editMode?"✏️ EDIT MEMBER":"➕ NEW MEMBER"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div className="field-group" style={{gridColumn:"1/-1"}}>
              <div className="field-label">Full Name *</div>
              <input type="text" placeholder="e.g. Rahul Sharma" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
            </div>
            <div className="field-group">
              <div className="field-label">Phone Number *</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"#25d366",fontWeight:700,fontSize:14}}>+91</span>
                <input type="tel" placeholder="9876543210" maxLength={10} value={form.phone||""} onChange={e=>setForm(p=>({...p,phone:e.target.value.replace(/[^0-9]/g,"").slice(0,10)}))} style={{flex:1}}/>
              </div>
            </div>
            <div className="field-group">
              <div className="field-label">Member PIN</div>
              <input type="text" maxLength={4} placeholder="Default: last 4 of phone" value={form.pin||""} onChange={e=>setForm(p=>({...p,pin:e.target.value.replace(/[^0-9]/g,"").slice(0,4)}))} style={{letterSpacing:6,fontSize:18,fontWeight:700}}/>
              <div style={{fontSize:9,color:"#4b5563",fontFamily:"'Barlow',sans-serif",marginTop:3}}>Leave blank to use last 4 digits of phone</div>
            </div>
            <div className="field-group">
              <div className="field-label">Date of Birth</div>
              <input type="date" value={form.dob||""} onChange={e=>setForm(p=>({...p,dob:e.target.value}))}/>
            </div>
          </div>
          <div className="field-group">
            <div className="field-label">Fitness Goal</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {["Weight Loss","Muscle Gain","General Fitness","Cardio","Flexibility","Other"].map(g=>(
                <button key={g} onClick={()=>setForm(p=>({...p,goal:g}))} style={{cursor:"pointer",borderRadius:5,padding:"5px 10px",fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1,border:"1.5px solid",transition:"all 0.15s",
                  background:form.goal===g?"rgba(96,165,250,0.2)":"rgba(255,255,255,0.03)",
                  borderColor:form.goal===g?"#60a5fa":"rgba(255,255,255,0.08)",
                  color:form.goal===g?"#60a5fa":"#6b7280"}}>{g}</button>
              ))}
            </div>
          </div>
          <div className="field-group">
            <div className="field-label">Package *</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {PACKAGES.map(pkg=>(
                <button key={pkg.name} onClick={()=>setForm(p=>({...p,package:pkg.name}))} style={{cursor:"pointer",flex:1,minWidth:80,borderRadius:7,padding:"9px 6px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,letterSpacing:1,border:"1.5px solid",transition:"all 0.15s",textAlign:"center",
                  background:form.package===pkg.name?"rgba(96,165,250,0.15)":"rgba(255,255,255,0.03)",
                  borderColor:form.package===pkg.name?"#60a5fa":"rgba(255,255,255,0.08)",
                  color:form.package===pkg.name?"#60a5fa":"#6b7280"}}>
                  {pkg.name}{pkg.days?"\n"+pkg.days+"d":""}
                </button>
              ))}
            </div>
            {form.package==="Custom"&&(
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
                <input type="number" min={1} max={730} value={form.customDays||30} onChange={e=>setForm(p=>({...p,customDays:Number(e.target.value)||30}))} style={{width:80,textAlign:"center",fontSize:18,fontWeight:700}}/>
                <span style={{fontSize:12,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>days</span>
              </div>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div className="field-group">
              <div className="field-label">Start Date</div>
              <input type="date" value={form.startDate||today()} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/>
            </div>
            <div className="field-group">
              <div className="field-label">Expiry (auto)</div>
              <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.2)",borderRadius:6,fontSize:14,fontWeight:700,color:"#ffd60a"}}>{previewExpiry?fmtDate(previewExpiry):"—"}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div className="field-group">
              <div className="field-label">Fee Amount (₹)</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:16,color:"#ff8c00",fontWeight:700}}>₹</span>
                <input type="number" placeholder="1500" value={form.feeAmount||""} onChange={e=>setForm(p=>({...p,feeAmount:e.target.value}))} style={{flex:1}}/>
              </div>
            </div>
            <div className="field-group">
              <div className="field-label">Fee Status</div>
              <div style={{display:"flex",gap:6}}>
                {[["Paid",true,"#00ff87"],["Pending",false,"#ff4d6d"]].map(([l,v,col])=>(
                  <button key={l} onClick={()=>setForm(p=>({...p,feePaid:v}))} style={{cursor:"pointer",flex:1,borderRadius:7,padding:"9px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,letterSpacing:1,border:"1.5px solid",transition:"all 0.15s",
                    background:form.feePaid===v?`rgba(${v?"0,255,135":"255,77,109"},0.15)`:"rgba(255,255,255,0.03)",
                    borderColor:form.feePaid===v?col:"rgba(255,255,255,0.08)",color:form.feePaid===v?col:"#6b7280"}}>{l}</button>
                ))}
              </div>
            </div>
          </div>
          {staff&&staff.length>0&&<div className="field-group">
            <div className="field-label">Assigned Trainer (optional)</div>
            <select value={form.trainerId||""} onChange={e=>setForm(p=>({...p,trainerId:e.target.value}))} style={{color:"#e8edf2"}}>
              <option value="">— No Trainer —</option>
              {staff.map(s=><option key={s.id} value={s.id}>{s.name} — {s.role}</option>)}
            </select>
          </div>}
          <div className="field-group">
            <div className="field-label">Notes</div>
            <textarea rows={2} placeholder="Any notes..." value={form.notes||""} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/>
          </div>
          <button className="save-btn" style={{width:"100%",marginTop:4,background:"linear-gradient(135deg,#1d4ed8,#60a5fa)"}} onClick={saveMember} disabled={saving}>
            {saving?<><span className="spinner"></span>SAVING...</>:editMode?"UPDATE MEMBER":"ADD MEMBER"}
          </button>
        </div>
      </div>
    );
  }

  // ── MEMBER DETAIL ──
  if(view==="detail"&&selMember){
    const m=members.find(x=>x.id===selMember.id)||selMember;
    const dl=daysLeft(m.expiryDate);
    const st=memberStatus(m);
    const trainer=staff?.find(s=>s.id===m.trainerId);
    return(
      <div>
        <button onClick={()=>{setView("list");setSelMember(null);}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:1,marginBottom:16,display:"flex",alignItems:"center",gap:6}}>← BACK</button>
        <div style={{background:"rgba(96,165,250,0.04)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:14,padding:"18px",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <div className="member-avatar" style={{background:"rgba(96,165,250,0.12)",border:"1.5px solid rgba(96,165,250,0.3)",color:"#60a5fa",width:54,height:54,fontSize:20,borderRadius:13}}>{m.name[0]?.toUpperCase()}</div>
              <div>
                <div style={{fontSize:20,fontWeight:900}}>{m.name}</div>
                {m.phone&&<div style={{fontSize:12,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>📱 {m.phone}</div>}
                {m.goal&&<span className="pt-goal-badge" style={{marginTop:4,display:"inline-block"}}>{m.goal}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              <button onClick={()=>{setForm({...m});setEditMode(true);setView("add");}} style={{cursor:"pointer",background:"rgba(255,140,0,0.1)",border:"1px solid rgba(255,140,0,0.3)",borderRadius:6,padding:"6px 12px",color:"#ff8c00",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,letterSpacing:1}}>✏️ EDIT</button>
              <button onClick={()=>deleteMember(m)} style={{cursor:"pointer",background:"rgba(255,77,109,0.1)",border:"1px solid rgba(255,77,109,0.3)",borderRadius:6,padding:"6px 12px",color:"#ff4d6d",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,letterSpacing:1}}>🗑 DELETE</button>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
            <span className={"pkg-badge "+pkgClass(m.package)}>{m.package}</span>
            <span className={"days-pill "+(st==="active"?"days-ok":st==="expiring"?"days-warn":"days-expired")}>
              {dl>=0?dl+" days left":"Expired "+Math.abs(dl)+"d ago"}
            </span>
            {m.feePaid?<span style={{fontSize:11,color:"#00ff87",fontWeight:700}}>✓ Fee Paid</span>:<span style={{fontSize:11,color:"#ff4d6d",fontWeight:700}}>⏳ Fee Pending</span>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}}>
            {[["Start",fmtDate(m.startDate),"#60a5fa"],["Expiry",fmtDate(m.expiryDate),st==="active"?"#00ff87":st==="expiring"?"#ffd60a":"#ff4d6d"],["Fee","₹"+Number(m.feeAmount||0).toLocaleString("en-IN"),"#ff8c00"],["Trainer",trainer?.name||"None","#a78bfa"]].map(([l,v,col])=>(
              <div key={l} style={{background:"rgba(0,0,0,0.2)",borderRadius:7,padding:"8px 12px"}}>
                <div style={{fontSize:9,color:"#4b5563",letterSpacing:1,fontFamily:"'Barlow',sans-serif",textTransform:"uppercase"}}>{l}</div>
                <div style={{fontSize:14,fontWeight:700,color:col,marginTop:2}}>{v}</div>
              </div>
            ))}
          </div>
          {m.notes&&<div style={{marginTop:10,fontSize:12,color:"#6b7280",fontFamily:"'Barlow',sans-serif",fontStyle:"italic",padding:"7px 10px",background:"rgba(255,255,255,0.03)",borderRadius:6}}>"{m.notes}"</div>}
        </div>
        {/* Actions */}
        {m.phone&&<div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <button className="wa-btn" style={{flex:1,justifyContent:"center",padding:"10px"}} onClick={()=>sendExpiry(m,dl)}>
            💬 {st==="expired"?"Expired Notice":"Expiry Reminder"}
          </button>
          <button className="wa-btn" style={{flex:1,justifyContent:"center",padding:"10px"}} onClick={()=>{
            const msg="Hi "+m.name+"!\n\nThank you for being a valued member of Surya Gym 2.0.\n\nYour membership has been renewed:\nPackage: "+m.package+"\nExpiry: "+fmtDate(m.expiryDate)+"\nFee: ₹"+Number(m.feeAmount||0).toLocaleString("en-IN")+(m.feePaid?" (PAID)":"")+"\n\nKeep up the great work!\nSurya Gym 2.0";
            openWA(m.phone,msg);
          }}>💬 Renewal Receipt</button>
        </div>}
      </div>
    );
  }

  // ── LIST VIEW ──
  const expiringMembers=members.filter(m=>{const dl=daysLeft(m.expiryDate);return dl!==null&&dl>=0&&dl<=7;});
  return(
    <div>
      {/* Top stats */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {[["Total",members.length,"#60a5fa"],["Active",activeCount,"#00ff87"],["Expiring",expiringCount,"#ffd60a"],["Expired",expiredCount,"#ff4d6d"]].map(([l,v,col])=>(
          <div key={l} className="stat-card" style={{flex:1,minWidth:60,cursor:l!=="Total"?"pointer":undefined}} onClick={()=>l!=="Total"&&setFilter(l.toLowerCase())}>
            <div style={{fontSize:22,fontWeight:900,color:col,lineHeight:1}}>{v}</div>
            <div style={{fontSize:9,color:"#6b7280",letterSpacing:1,marginTop:3,fontFamily:"'Barlow',sans-serif",textTransform:"uppercase"}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Expiry alerts */}
      {expiringMembers.length>0&&(
        <div style={{background:"rgba(255,214,10,0.05)",border:"1px solid rgba(255,214,10,0.25)",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#ffd60a",letterSpacing:1,marginBottom:8}}>⚠️ EXPIRING THIS WEEK ({expiringMembers.length})</div>
          {expiringMembers.map(m=>{
            const dl=daysLeft(m.expiryDate);
            return(
              <div key={m.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:8}}>
                <div>
                  <span style={{fontSize:13,fontWeight:700}}>{m.name}</span>
                  <span style={{fontSize:11,color:dl===0?"#ff4d6d":"#ffd60a",fontFamily:"'Barlow',sans-serif",marginLeft:8}}>{dl===0?"Expires today":dl+" day"+(dl>1?"s":"")+" left"}</span>
                </div>
                {m.phone&&<button className="wa-btn" style={{padding:"4px 10px",fontSize:10}} onClick={()=>sendExpiry(m,dl)}>💬 Remind</button>}
              </div>
            );
          })}
        </div>
      )}

      {/* Action buttons */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <button onClick={()=>{resetForm();setView("add");}} style={{flex:2,cursor:"pointer",background:"rgba(96,165,250,0.1)",border:"1.5px dashed rgba(96,165,250,0.35)",borderRadius:9,padding:"12px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1.5,color:"#60a5fa"}}>+ ADD MEMBER</button>
        <button onClick={()=>setView("checkin")} style={{flex:1,cursor:"pointer",background:"rgba(0,255,135,0.08)",border:"1.5px solid rgba(0,255,135,0.25)",borderRadius:9,padding:"12px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,letterSpacing:1,color:"#00ff87"}}>✅ CHECK-IN</button>
        <button onClick={()=>setView("announce")} style={{flex:1,cursor:"pointer",background:"rgba(37,211,102,0.08)",border:"1.5px solid rgba(37,211,102,0.25)",borderRadius:9,padding:"12px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,letterSpacing:1,color:"#25d366"}}>📢 ANNOUNCE</button>
      </div>

      {/* Search + filter */}
      <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
        <input placeholder="Search name or phone..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} style={{flex:1,minWidth:140}}/>
        <div style={{display:"flex",gap:4}}>
          {[["all","All"],["active","Active"],["expiring","Expiring"],["expired","Expired"]].map(([v,l])=>(
            <button key={v} className={"pt-filter-btn"+(filter===v?" active":"")} onClick={()=>setFilter(v)}>{l}</button>
          ))}
        </div>
      </div>

      {/* Members list */}
      {filtered.length===0
        ?<div className="empty"><div style={{fontSize:42,marginBottom:12}}>👥</div><div style={{fontSize:16,letterSpacing:2}}>NO MEMBERS FOUND</div></div>
        :filtered.map((m,i)=>{
          const dl=daysLeft(m.expiryDate);
          const st=memberStatus(m);
          const trainer=staff?.find(s=>s.id===m.trainerId);
          return(
            <div key={m.id} className={"member-card "+(st==="expiring"?"expiring":st==="expired"?"expired":"active-ok")} style={{animationDelay:i*0.04+"s"}} onClick={()=>{setSelMember(m);setView("detail");}}>
              <div style={{display:"flex",alignItems:"center",gap:11}}>
                <div className="member-avatar" style={{background:st==="active"?"rgba(0,255,135,0.08)":st==="expiring"?"rgba(255,214,10,0.08)":"rgba(255,77,109,0.08)",border:"1.5px solid "+(st==="active"?"rgba(0,255,135,0.2)":st==="expiring"?"rgba(255,214,10,0.2)":"rgba(255,77,109,0.2)"),color:st==="active"?"#00ff87":st==="expiring"?"#ffd60a":"#ff4d6d"}}>{m.name[0]?.toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                    <div style={{fontSize:15,fontWeight:700}}>{m.name}</div>
                    <span className={"pkg-badge "+pkgClass(m.package)}>{m.package}</span>
                    {!m.feePaid&&<span style={{fontSize:9,background:"rgba(255,77,109,0.1)",border:"1px solid rgba(255,77,109,0.25)",borderRadius:3,padding:"2px 6px",color:"#ff4d6d",letterSpacing:1}}>FEE DUE</span>}
                  </div>
                  <div style={{display:"flex",gap:8,marginTop:5,alignItems:"center",flexWrap:"wrap"}}>
                    <span className={"days-pill "+(st==="active"?"days-ok":st==="expiring"?"days-warn":"days-expired")}>
                      {dl!==null?(dl>=0?dl+" days left":"Expired"):"No expiry"}
                    </span>
                    {trainer&&<span className="trainer-chip">&#x1F3CB; {trainer.name}</span>}
                    {m.phone&&<span style={{fontSize:10,color:"#374151",fontFamily:"'Barlow',sans-serif"}}>📱 {m.phone}</span>}
                  </div>
                </div>
                <div style={{color:"#374151",fontSize:16,flexShrink:0}}>›</div>
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

/* ── REVENUE TAB ── */
function RevenueTab({members, gymConfig, gymId, gymName, onSaveGymConfig}){
  const [editUpi, setEditUpi] = useState(false);
  const [upiForm, setUpiForm] = useState({upiId:gymConfig.upiId||"",upiName:gymConfig.upiName||gymName||""});
  const [saving,  setSaving]  = useState(false);

  useEffect(()=>{
    setUpiForm({upiId:gymConfig.upiId||"",upiName:gymConfig.upiName||gymName||""});
  },[gymConfig]);

  const saveUpi=async()=>{
    if(!upiForm.upiId.trim()){alert("Enter UPI ID!");return;}
    setSaving(true);
    await onSaveGymConfig({...gymConfig,...upiForm});
    setSaving(false); setEditUpi(false);
  };

  // Revenue stats by package
  const now=new Date();
  const thisMonth=now.getMonth(); const thisYear=now.getFullYear();
  const paidMembers=members.filter(m=>m.feePaid&&m.feeAmount>0);
  const totalRevenue=members.filter(m=>m.feePaid).reduce((s,m)=>s+Number(m.feeAmount||0),0);
  const pendingRevenue=members.filter(m=>!m.feePaid).reduce((s,m)=>s+Number(m.feeAmount||0),0);
  const activeMembers=members.filter(m=>memberStatus(m)!=="expired");
  const expiredMembers=members.filter(m=>memberStatus(m)==="expired");

  // Package breakdown
  const pkgBreakdown=PACKAGES.map(p=>{
    const mems=members.filter(m=>m.package===p.name);
    const rev=mems.filter(m=>m.feePaid).reduce((s,m)=>s+Number(m.feeAmount||0),0);
    return{...p,count:mems.length,revenue:rev,pending:mems.filter(m=>!m.feePaid).length};
  }).filter(p=>p.count>0);

  const upiId=gymConfig.upiId||"";
  const upiName=gymConfig.upiName||gymName||"Surya Gym 2.0";
  const qrUrl=upiId?`https://api.qrserver.com/v1/create-qr-code/?size=220x220&color=ffffff&bgcolor=000000&data=upi://pay?pa=${encodeURIComponent(upiId)}%26pn=${encodeURIComponent(upiName)}%26cu=INR&format=png`:"";

  return(
    <div>
      {/* Revenue overview */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[["Total Collected","₹"+totalRevenue.toLocaleString("en-IN"),"#00ff87"],["Fee Pending","₹"+pendingRevenue.toLocaleString("en-IN"),"#ff4d6d"],["Active Members",activeMembers.length,"#60a5fa"],["Expired",expiredMembers.length,"#ff8c00"]].map(([l,v,col])=>(
          <div key={l} className="rev-card">
            <div style={{fontSize:20,fontWeight:900,color:col,lineHeight:1}}>{v}</div>
            <div style={{fontSize:9,color:"#6b7280",letterSpacing:1,marginTop:3,fontFamily:"'Barlow',sans-serif",textTransform:"uppercase"}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Package breakdown */}
      <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"16px",marginBottom:16}}>
        <div className="member-section-title" style={{marginTop:0}}>PACKAGE BREAKDOWN</div>
        {pkgBreakdown.length===0?<div style={{color:"#4b5563",fontSize:12,fontFamily:"'Barlow',sans-serif"}}>No members yet.</div>:pkgBreakdown.map(p=>(
          <div key={p.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>

function MemberPortal({member, members, gymConfig, gymId, gymName, onLogout, onSaveMemberAttend, loadMemberAttend}){
  const m = members.find(x=>x.id===member.id)||member;
  const [checkedIn, setCheckedIn] = useState(false);
  const [checkInLoading, setCheckInLoading] = useState(true);
  const [history, setHistory] = useState([]);
  const [view, setView] = useState("home"); // home | history

  const dl = daysLeft(m.expiryDate);
  const st = memberStatus(m);

  useEffect(()=>{
    loadMemberAttend(today()).then(data=>{
      if(data?.checked?.includes(m.id))setCheckedIn(true);
      setCheckInLoading(false);
    }).catch(()=>setCheckInLoading(false));
  },[]);

  const doCheckIn = async () => {
    setCheckInLoading(true);
    const existing = await loadMemberAttend(today()).catch(()=>null);

  return(

        <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}}>

        border:"1px solid "+(st==="active"?"rgba(0,255,135,0.2)":st==="expiring"?"rgba(255,214,10,0.2)":"rgba(255,77,109,0.2)"),
        borderRadius:16,padding:"20px",marginBottom:16}}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
          <div>
            <span className={"pkg-badge "+pkgClass(m.package)} style={{fontSize:12,padding:"4px 12px"}}>{m.package}</span>
            <div style={{marginTop:10,fontSize:12,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>Valid till</div>

          </div>
        ))}
      </div>

      {/* Pay via UPI */}
      {!m.feePaid&&upiId&&(

          <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>💳 Pay Your Fee</div>

/* ── PERSONAL TRAINING TAB ── */
function PTTab({staff, ptClients, ptSessions, gymId, showToast, onSaveClient, onDeleteClient, onSaveSession}){
  const [view,       setView]       = useState("clients"); // clients | add | detail
  const [selClient,  setSelClient]  = useState(null);
  const [filterTrainer, setFilterTrainer] = useState("all");
  const [filterStatus,  setFilterStatus]  = useState("all");
  const [form, setForm] = useState({name:"",phone:"",goal:"",trainerId:"",totalSessions:12,feePaid:false,feeAmount:"",startDate:today(),notes:""});
  const [saving, setSaving] = useState(false);
  const [editMode, setEditMode] = useState(false);

  const GOALS = ["Weight Loss","Muscle Gain","General Fitness","Rehabilitation","Flexibility","Sports Training","Pre/Post Natal","Other"];

  const trainers = staff.filter(e=>e.role?.toLowerCase().includes("train") || true);

  const resetForm = () => setForm({name:"",phone:"",goal:"",trainerId:staff[0]?.id||"",totalSessions:12,feePaid:false,feeAmount:"",startDate:today(),notes:""});

  const clientSessions = (clientId) => ptSessions.filter(s=>s.clientId===clientId);
  const doneSessions   = (clientId) => clientSessions(clientId).filter(s=>s.status==="done").length;
  const missedSessions = (clientId) => clientSessions(clientId).filter(s=>s.status==="missed").length;

  const saveClient = async () => {
    if(!form.name.trim()){showToast("Enter client name!");return;}
    if(!form.trainerId){showToast("Assign a trainer!");return;}
    setSaving(true);
    const id = editMode ? selClient.id : "ptc_"+Date.now();
    const data = {...form, id, updatedAt:new Date().toISOString(), createdAt: editMode?selClient.createdAt:new Date().toISOString()};
    await onSaveClient(id, data);
    showToast(editMode?"✓ Client updated!":"✓ Client added!");
    setSaving(false);
    resetForm(); setEditMode(false); setView("clients");
  };

  const deleteClient = async (client) => {
    if(!window.confirm("Delete "+client.name+"? This cannot be undone."))return;
    await onDeleteClient(client.id);
    showToast("Client removed.");
    setView("clients"); setSelClient(null);
  };

  const toggleSession = async (clientId, dateStr, currentStatus) => {
    const id = "pts_"+clientId+"_"+dateStr;
    const next = currentStatus==="done"?"missed":currentStatus==="missed"?"":  "done";
    if(next===""){
      // remove session
      await onSaveSession(id,{clientId,date:dateStr,status:"none",id});
    } else {
      await onSaveSession(id,{clientId,date:dateStr,status:next,id});
    }
  };

  const getSessionStatus = (clientId, dateStr) => {
    const s = ptSessions.find(s=>s.clientId===clientId&&s.date===dateStr);
    return s?.status||"";
  };

  // Build last 30 days for session grid
  const last30 = Array.from({length:30},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-29+i);
    return d.toISOString().split("T")[0];
  });

  // Filtered clients
  const filtered = ptClients.filter(cl=>{
    if(filterTrainer!=="all"&&cl.trainerId!==filterTrainer)return false;
    const done=doneSessions(cl.id);
    if(filterStatus==="active"&&done>=Number(cl.totalSessions||0))return false;
    if(filterStatus==="completed"&&done<Number(cl.totalSessions||0))return false;
    return true;
  });

  const activeCount   = ptClients.filter(cl=>doneSessions(cl.id)<Number(cl.totalSessions||0)).length;
  const completedCount= ptClients.filter(cl=>doneSessions(cl.id)>=Number(cl.totalSessions||0)&&cl.totalSessions>0).length;
  const feesPending   = ptClients.filter(cl=>!cl.feePaid).length;

  // ── CLIENT DETAIL VIEW ──
  if(view==="detail"&&selClient){
    const cl = ptClients.find(c=>c.id===selClient.id)||selClient;
    const trainer = staff.find(s=>s.id===cl.trainerId);
    const done=doneSessions(cl.id);
    const missed=missedSessions(cl.id);
    const total=Number(cl.totalSessions||0);
    const pct=total>0?Math.round(done/total*100):0;
    const remaining=Math.max(0,total-done);

    return(
      <div>
        <button onClick={()=>{setView("clients");setSelClient(null);}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:1,marginBottom:16,display:"flex",alignItems:"center",gap:6}}>
          ← BACK TO CLIENTS
        </button>

        {/* Client header */}
        <div style={{background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:14,padding:"18px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <div style={{width:50,height:50,borderRadius:12,background:"rgba(167,139,250,0.15)",border:"1.5px solid rgba(167,139,250,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#a78bfa",flexShrink:0}}>{cl.name[0]?.toUpperCase()}</div>
              <div>
                <div style={{fontSize:20,fontWeight:900}}>{cl.name}</div>
                {cl.phone&&<div style={{fontSize:12,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>📱 {cl.phone}</div>}
                {cl.goal&&<span className="pt-goal-badge" style={{marginTop:4,display:"inline-block"}}>{cl.goal}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>{setForm({...cl});setEditMode(true);setView("add");}} style={{cursor:"pointer",background:"rgba(255,140,0,0.1)",border:"1px solid rgba(255,140,0,0.3)",borderRadius:6,padding:"6px 12px",color:"#ff8c00",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,letterSpacing:1}}>✏️ EDIT</button>
              <button onClick={()=>deleteClient(cl)} style={{cursor:"pointer",background:"rgba(255,77,109,0.1)",border:"1px solid rgba(255,77,109,0.3)",borderRadius:6,padding:"6px 12px",color:"#ff4d6d",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,letterSpacing:1}}>🗑 DELETE</button>
            </div>
          </div>

          <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
            {[["Trainer",trainer?.name||"Unassigned","#ff8c00"],["Sessions Done",done,"#00ff87"],["Missed",missed,"#ff4d6d"],["Remaining",remaining,"#a78bfa"],["Package",total+" sessions","#ffd60a"]].map(([l,v,col])=>(

              <span>Progress</span><span style={{color:pct>=100?"#00ff87":"#a78bfa",fontWeight:700}}>{pct}% complete</span>
            </div>
            <div className="pt-progress-bar">
              <div className="pt-progress-fill" style={{width:pct+"%",background:pct>=100?"linear-gradient(90deg,#00ff87,#059669)":"linear-gradient(90deg,#a78bfa,#7c3aed)"}}/>

          {/* Fee status */}

              return(
                <div key={dateStr} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{fontSize:8,color:isToday?"#ff4d00":"#374151",fontFamily:"'Barlow',sans-serif",fontWeight:isToday?700:400}}>{dayNum}</div>
                  <div className={"session-dot "+(status==="done"?"done":status==="missed"?"missed":"empty")}
                    onClick={()=>!isFuture&&toggleSession(cl.id,dateStr,status)}
                    style={{opacity:isFuture?0.25:1,cursor:isFuture?"not-allowed":"pointer",border:isToday?"1.5px solid #ff4d00":undefined}}
                    title={dateStr}>
                    {status==="done"?"✓":status==="missed"?"✗":""}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:14,marginTop:12,flexWrap:"wrap"}}>
            {[["✓ Done","#00ff87"],["✗ Missed","#ff4d6d"],["Empty = not scheduled","#374151"]].map(([l,col])=>(
              <div key={l} style={{fontSize:10,color:col,fontFamily:"'Barlow',sans-serif"}}>{l}</div>
            ))}
          </div>
        </div>

        {/* WhatsApp to client */}
        {cl.phone&&<div style={{marginTop:12,display:"flex",gap:8}}>
          <button className="wa-btn" style={{flex:1,justifyContent:"center",padding:"10px"}} onClick={()=>{
            const msg="Hi "+cl.name+"!\\nSurya Gym 2.0 - PT Update\\n\\nTrainer: "+(trainer?.name||"")+"\\nSessions Done: "+done+"/"+total+"\\nRemaining: "+remaining+" sessions\\nFee: "+(cl.feePaid?"PAID":"PENDING")+"\\n\\nSee you at the gym!";
            openWA(cl.phone,msg);
          }}>💬 WhatsApp Client</button>
        </div>}
      </div>
    );
  }

  // ── ADD/EDIT FORM ──
  if(view==="add"){
    return(
      <div>
        <button onClick={()=>{setView("clients");resetForm();setEditMode(false);}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,letterSpacing:1,marginBottom:16,display:"flex",alignItems:"center",gap:6}}>
          ← BACK
        </button>
        <div style={{background:"rgba(167,139,250,0.04)",border:"1px solid rgba(167,139,250,0.15)",borderRadius:12,padding:"20px"}}>
          <div style={{fontSize:16,fontWeight:900,letterSpacing:2,color:"#a78bfa",marginBottom:18}}>{editMode?"✏️ EDIT CLIENT":"➕ NEW PT CLIENT"}</div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div className="field-group" style={{gridColumn:"1/-1"}}>
              <div className="field-label">Client Name *</div>
              <input type="text" placeholder="e.g. Rahul Sharma" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
            </div>
            <div className="field-group">
              <div className="field-label">Phone Number</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"#25d366",fontWeight:700,fontSize:14}}>+91</span>
                <input type="text" placeholder="9876543210" maxLength={10} value={form.phone||""} onChange={e=>setForm(p=>({...p,phone:e.target.value.replace(/[^0-9]/g,"").slice(0,10)}))} style={{flex:1}}/>
              </div>
            </div>
            <div className="field-group">
              <div className="field-label">Start Date</div>
              <input type="date" value={form.startDate||today()} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/>
            </div>
          </div>

          <div className="field-group">
            <div className="field-label">Fitness Goal</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
              {GOALS.map(g=>(
                <button key={g} onClick={()=>setForm(p=>({...p,goal:g}))}
                  style={{cursor:"pointer",borderRadius:5,padding:"5px 11px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,letterSpacing:1,border:"1.5px solid",transition:"all 0.15s",
                    background:form.goal===g?"rgba(167,139,250,0.2)":"rgba(255,255,255,0.03)",
                    borderColor:form.goal===g?"#a78bfa":"rgba(255,255,255,0.08)",
                    color:form.goal===g?"#a78bfa":"#6b7280"}}>
                  {g}
                </button>
              ))}
            </div>
          </div>

          <div className="field-group">
            <div className="field-label">Assigned Trainer *</div>
            <select value={form.trainerId||""} onChange={e=>setForm(p=>({...p,trainerId:e.target.value}))} style={{color:"#e8edf2"}}>
              <option value="">— Select Trainer —</option>
              {staff.map(s=><option key={s.id} value={s.id}>{s.name} — {s.role}</option>)}
            </select>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div className="field-group">
              <div className="field-label">Session Package</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <input type="number" min={1} max={365} value={form.totalSessions||12} onChange={e=>setForm(p=>({...p,totalSessions:Number(e.target.value)||12}))} style={{width:80,textAlign:"center",fontSize:18,fontWeight:700}}/>
                <span style={{fontSize:12,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>sessions</span>
              </div>
            </div>
            <div className="field-group">
              <div className="field-label">Fee Amount (₹)</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:16,color:"#ff8c00",fontWeight:700}}>₹</span>
                <input type="number" placeholder="5000" value={form.feeAmount||""} onChange={e=>setForm(p=>({...p,feeAmount:e.target.value}))} style={{flex:1}}/>
              </div>
            </div>
          </div>

          <div className="field-group">
            <div className="field-label">Fee Status</div>
            <div style={{display:"flex",gap:8}}>
              {[["Paid",true,"#00ff87"],["Pending",false,"#ff4d6d"]].map(([lbl,val,col])=>(
                <button key={lbl} onClick={()=>setForm(p=>({...p,feePaid:val}))}
                  style={{cursor:"pointer",flex:1,borderRadius:7,padding:"9px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1,border:"1.5px solid",transition:"all 0.15s",
                    background:form.feePaid===val?`rgba(${val?"0,255,135":"255,77,109"},0.15)`:"rgba(255,255,255,0.03)",
                    borderColor:form.feePaid===val?col:"rgba(255,255,255,0.08)",color:form.feePaid===val?col:"#6b7280"}}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          <div className="field-group">
            <div className="field-label">Notes</div>
            <textarea rows={2} placeholder="Any notes about the client..." value={form.notes||""} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/>
          </div>

          <button className="save-btn" style={{width:"100%",marginTop:4,background:"linear-gradient(135deg,#7c3aed,#a78bfa)"}} onClick={saveClient} disabled={saving}>
            {saving?<><span className="spinner"></span>SAVING...</>:editMode?"UPDATE CLIENT":"ADD CLIENT"}
          </button>
        </div>
      </div>
    );
  }

  // ── CLIENTS LIST VIEW ──
  return(
    <div>
      {/* Summary stats */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[["Total Clients",ptClients.length,"#a78bfa"],["Active",activeCount,"#00ff87"],["Completed",completedCount,"#60a5fa"],["Fee Pending",feesPending,"#ff4d6d"]].map(([l,v,col])=>(
          <div key={l} className="stat-card" style={{flex:1,minWidth:70}}>
            <div style={{fontSize:22,fontWeight:900,color:col,lineHeight:1}}>{v}</div>
            <div style={{fontSize:9,color:"#6b7280",letterSpacing:1,marginTop:3,fontFamily:"'Barlow',sans-serif",textTransform:"uppercase"}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4}}>
          {[["all","All"],["active","Active"],["completed","Done"]].map(([v,l])=>(
            <button key={v} className={"pt-filter-btn"+(filterStatus===v?" active":"")} onClick={()=>setFilterStatus(v)}>{l}</button>
          ))}
        </div>
        <select value={filterTrainer} onChange={e=>setFilterTrainer(e.target.value)} style={{flex:1,minWidth:120,color:"#e8edf2"}}>
          <option value="all">All Trainers</option>
          {staff.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <button className="pt-add-btn" style={{width:"auto",padding:"7px 16px",marginBottom:0,fontSize:12}} onClick={()=>{resetForm();setForm(p=>({...p,trainerId:staff[0]?.id||""}));setView("add");}}>+ ADD CLIENT</button>
      </div>

      {filtered.length===0
        ?<div className="empty"><div style={{fontSize:42,marginBottom:12}}>💪</div><div style={{fontSize:16,letterSpacing:2}}>NO PT CLIENTS YET</div><div style={{fontSize:12,color:"#4b5563",fontFamily:"'Barlow',sans-serif",marginTop:8}}>Tap + ADD CLIENT to get started</div></div>
        :filtered.map((cl,i)=>{
          const trainer=staff.find(s=>s.id===cl.trainerId);
          const done=doneSessions(cl.id);
          const missed=missedSessions(cl.id);
          const total=Number(cl.totalSessions||0);
          const pct=total>0?Math.round(done/total*100):0;
          const isComplete=total>0&&done>=total;
          return(
            <div key={cl.id} className="pt-client-card" style={{animationDelay:`${i*0.05}s`,borderColor:isComplete?"rgba(96,165,250,0.3)":cl.feePaid?"rgba(255,255,255,0.07)":"rgba(255,77,109,0.15)",cursor:"pointer"}}
              onClick={()=>{setSelClient(cl);setView("detail");}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:42,height:42,borderRadius:10,background:"rgba(167,139,250,0.12)",border:"1.5px solid rgba(167,139,250,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#a78bfa",flexShrink:0}}>{cl.name[0]?.toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <div style={{fontSize:16,fontWeight:700}}>{cl.name}</div>
                    {isComplete&&<span style={{fontSize:9,background:"rgba(96,165,250,0.15)",border:"1px solid #60a5fa",borderRadius:3,padding:"2px 6px",color:"#60a5fa",letterSpacing:1}}>COMPLETED</span>}
                    {!cl.feePaid&&<span style={{fontSize:9,background:"rgba(255,77,109,0.12)",border:"1px solid rgba(255,77,109,0.3)",borderRadius:3,padding:"2px 6px",color:"#ff4d6d",letterSpacing:1}}>FEE DUE</span>}
                  </div>
                  <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                    {trainer&&<span className="trainer-chip">&#x1F3CB; {trainer.name}</span>}
                    {cl.goal&&<span className="pt-goal-badge">{cl.goal}</span>}
                  </div>
                  <div style={{marginTop:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif",marginBottom:3}}>
                      <span>{done}/{total} sessions</span>
                      <span style={{color:isComplete?"#60a5fa":"#a78bfa",fontWeight:700}}>{pct}%</span>
                    </div>
                    <div className="pt-progress-bar">
                      <div className="pt-progress-fill" style={{width:pct+"%",background:isComplete?"linear-gradient(90deg,#60a5fa,#3b82f6)":undefined}}/>
                    </div>
                  </div>
                  {(missed>0||cl.feeAmount)&&<div style={{display:"flex",gap:10,marginTop:6,flexWrap:"wrap"}}>
                    {missed>0&&<span className="pt-stat-pill" style={{color:"#ff4d6d"}}>{missed} missed</span>}
                    {cl.feeAmount&&<span className="pt-stat-pill" style={{color:cl.feePaid?"#00ff87":"#ff4d6d"}}>₹{Number(cl.feeAmount).toLocaleString("en-IN")} {cl.feePaid?"paid":"due"}</span>}
                    {cl.startDate&&<span className="pt-stat-pill" style={{color:"#4b5563",marginLeft:"auto"}}>since {new Date(cl.startDate+"T00:00:00").toLocaleDateString("en-IN",{day:"2-digit",month:"short"})}</span>}
                  </div>}
                </div>
                <div style={{color:"#374151",fontSize:16}}>›</div>
              </div>
            </div>
          );
        })
      }
    </div>
  );
}


/* ── GYM MANAGER ── */
function GymManager({gymList, activeGymId, onSwitch, onSave, onClose}){
  const [list, setList]   = useState(gymList.map(g=>({...g})));
  const [saving, setSaving] = useState(false);
  const addGym = () => setList(p=>[...p,{id:"gym_"+Date.now(),name:"",address:""}]);
  const upd = (id,f,v) => setList(p=>p.map(g=>g.id===id?{...g,[f]:v}:g));
  const del = (id) => { if(list.length<=1){alert("Must have at least one location!");return;} setList(p=>p.filter(g=>g.id!==id)); };
  const doSave = async () => {
    const valid=list.filter(g=>g.name.trim());
    if(!valid.length){alert("Add at least one location!");return;}
    setSaving(true); await onSave(valid); setSaving(false); onClose();
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title" style={{color:"#60a5fa"}}>&#x1F3DB; Gym Locations</div>
        <div style={{fontSize:11,color:"#4b5563",letterSpacing:2,fontFamily:"'Barlow',sans-serif",marginBottom:8}}>SWITCH LOCATION</div>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
          {list.filter(g=>g.name).map(g=>(
            <button key={g.id} onClick={()=>{onSwitch(g.id);onClose();}} style={{cursor:"pointer",background:g.id===activeGymId?"rgba(96,165,250,0.15)":"rgba(255,255,255,0.03)",border:"1.5px solid "+(g.id===activeGymId?"#60a5fa":"rgba(255,255,255,0.08)"),borderRadius:10,padding:"12px 16px",textAlign:"left",transition:"all 0.15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:18}}>&#x1F3CB;</span>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:g.id===activeGymId?"#60a5fa":"#e8edf2"}}>{g.name}</div>
                  {g.address&&<div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif",marginTop:2}}>{g.address}</div>}
                </div>
                {g.id===activeGymId&&<span style={{marginLeft:"auto",fontSize:10,color:"#60a5fa",border:"1px solid #60a5fa",borderRadius:4,padding:"2px 8px",fontWeight:700,letterSpacing:1}}>ACTIVE</span>}
              </div>
            </button>
          ))}
        </div>
        <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:16,marginBottom:12}}>
          <div style={{fontSize:11,color:"#4b5563",letterSpacing:2,fontFamily:"'Barlow',sans-serif",marginBottom:10}}>MANAGE LOCATIONS</div>
          {list.map((g,i)=>(
            <div key={g.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"12px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:11,color:"#60a5fa",letterSpacing:1,fontWeight:700}}>LOCATION #{i+1}</div>
                <button className="icon-btn del-btn" onClick={()=>del(g.id)}>&#x1F5D1; Remove</button>
              </div>
              <div className="field-group"><div className="field-label">Gym Name</div><input type="text" placeholder="e.g. Surya Gym Kothrud" value={g.name} onChange={e=>upd(g.id,"name",e.target.value)}/></div>
              <div className="field-group"><div className="field-label">Address (optional)</div><input type="text" placeholder="e.g. Kothrud, Pune" value={g.address||""} onChange={e=>upd(g.id,"address",e.target.value)}/></div>
            </div>
          ))}
          <button className="add-staff-btn" style={{borderColor:"rgba(96,165,250,0.4)",color:"#60a5fa"}} onClick={addGym}>+ ADD NEW LOCATION</button>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="save-btn" style={{flex:1,padding:"12px",background:"linear-gradient(135deg,#1d4ed8,#3b82f6)"}} onClick={doSave} disabled={saving}>{saving?<><span className="spinner"></span>SAVING...</>:"SAVE LOCATIONS"}</button>
          <button className="cancel-btn" onClick={onClose}>CANCEL</button>
        </div>
      </div>
    </div>
  );
}

/* ── LOGIN GATE ── */
function LoginGate({staff, members, onLogin}){
  const [step, setStep]   = useState("choose");
  const [pin,  setPin]    = useState("");
  const [selEmp, setSelEmp] = useState(null);
  const [selMember, setSelMember] = useState(null);
  const [shake, setShake]   = useState(false);

  const doShake = () => { setShake(true); setTimeout(()=>setShake(false),500); setPin(""); };

  const pressNum = (n) => {
    if(pin.length >= 4) return;
    const next = pin + n;
    setPin(next);
    if(next.length === 4){
      setTimeout(()=>{
        if(step === "owner-pin"){
          if(next === ADMIN_PASSWORD){ onLogin({role:"owner"}); }
          else { doShake(); }
        } else if(step === "staff-pin"){
          if(selEmp && next === (selEmp.pin||"0000")){ onLogin({role:"staff", emp:selEmp}); }
          else { doShake(); }
        } else if(step === "member-pin"){
          if(selMember && next === (selMember.pin||(selMember.phone||"0000").slice(-4))){ onLogin({role:"member", member:selMember}); }
          else { doShake(); }
        }
      }, 200);
    }
  };

  const del = () => setPin(p => p.slice(0,-1));

  return(
    <div className="login-wrap">
      <div className="grid-bg"></div>
      <div className="glow"></div>
      <div className="login-box" style={{position:"relative",zIndex:1}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:11,letterSpacing:4,color:"#ff4d00",fontWeight:700,marginBottom:4}}>SURYA GYM 2.0</div>
          <div style={{fontSize:26,fontWeight:900,letterSpacing:2}}>STAFF PORTAL</div>
          <div style={{width:40,height:3,background:"linear-gradient(90deg,#ff4d00,#ff8c00)",borderRadius:2,margin:"8px auto 0"}}></div>
        </div>

        {/* STEP 1: Choose role */}
        {step==="choose" && (
          <div>
            <div style={{fontSize:12,color:"#4b5563",letterSpacing:2,fontFamily:"'Barlow',sans-serif",marginBottom:16,textAlign:"center"}}>SELECT YOUR ROLE</div>
            <button className="login-role-btn login-role-owner" onClick={()=>{setStep("owner-pin");setPin("");}}>
              <span style={{fontSize:22}}>👑</span>
              <div><div style={{fontSize:16}}>OWNER / ADMIN</div><div style={{fontSize:11,color:"rgba(255,140,0,0.7)",fontWeight:400,fontFamily:"'Barlow',sans-serif",marginTop:2}}>Full access to all features</div></div>
            </button>
            <button className="login-role-btn login-role-staff" onClick={()=>{setStep("staff-select");setPin("");}}>
              <span style={{fontSize:22}}>👤</span>
              <div><div style={{fontSize:16}}>STAFF MEMBER</div><div style={{fontSize:11,color:"rgba(167,139,250,0.7)",fontWeight:400,fontFamily:"'Barlow',sans-serif",marginTop:2}}>View your attendance & apply leave</div></div>
            </button>
            <button className="login-role-btn" style={{border:"1.5px solid rgba(0,255,135,0.25)",background:"rgba(0,255,135,0.04)"}} onClick={()=>{setStep("member-phone");setPin("");}}>
              <span style={{fontSize:22}}>🏃</span>
              <div><div style={{fontSize:16,color:"#00ff87"}}>GYM MEMBER</div><div style={{fontSize:11,color:"rgba(0,255,135,0.6)",fontWeight:400,fontFamily:"'Barlow',sans-serif",marginTop:2}}>Check package, attendance & more</div></div>
            </button>
          </div>
        )}
        {/* Member phone entry */}
        {step==="member-phone"&&(
          <div>
            <div style={{fontSize:13,color:"#00ff87",letterSpacing:2,textAlign:"center",marginBottom:16}}>MEMBER LOGIN</div>
            <div className="field-group">
              <div className="field-label">Your Phone Number</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{color:"#25d366",fontWeight:700}}>+91</span>
                <input id="mem-phone" type="tel" maxLength={10} placeholder="9876543210" style={{flex:1,fontSize:18,letterSpacing:2}}
                  onChange={e=>{ const v=e.target.value.replace(/\D/g,"").slice(0,10); e.target.value=v; }}
                />
              </div>
            </div>
            <button className="save-btn" style={{width:"100%",marginTop:8,background:"linear-gradient(135deg,#059669,#00ff87)",color:"#000"}} onClick={()=>{
              const ph=document.getElementById("mem-phone")?.value||"";
              if(ph.length!==10){alert("Enter 10-digit phone number");return;}
              const mem=(members||[]).find(m=>m.phone===ph);
              if(!mem){alert("No member found with this number.
Contact the gym owner.");return;}
              setSelMember(mem); setStep("member-pin"); setPin("");
            }}>FIND MY ACCOUNT →</button>
            <button style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",width:"100%",marginTop:10,fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:1}} onClick={()=>setStep("choose")}>← BACK</button>
          </div>
        )}
        {/* Member PIN */}
        {step==="member-pin"&&selMember&&(
          <div>
            <div style={{textAlign:"center",marginBottom:8}}>
              <div style={{width:48,height:48,borderRadius:12,background:"rgba(0,255,135,0.1)",border:"1.5px solid rgba(0,255,135,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"#00ff87",margin:"0 auto 8px"}}>{selMember.name[0]?.toUpperCase()}</div>
              <div style={{fontSize:15,fontWeight:700}}>{selMember.name}</div>
              <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>{selMember.package}</div>
              <div style={{fontSize:11,color:"#00ff87",letterSpacing:2,marginTop:8}}>ENTER YOUR PIN</div>
            </div>
            <div className="pin-display">
              {[0,1,2,3].map(i=><div key={i} className={"pin-dot"+(pin.length>i?" filled":"")} style={{borderColor:shake?"#ff4d6d":undefined,background:shake&&pin.length>i?"#ff4d6d":undefined}}/>)}
            </div>
            <div className="pinpad">
              {[1,2,3,4,5,6,7,8,9].map(n=>(
                <button key={n} className="pin-btn" onClick={()=>pressNum(String(n))}>{n}</button>
              ))}

/* ── STAFF PORTAL ── */
function StaffPortal({session, staff, allDates, leaveReqs, showToast, onApprove, onReject, onLogout, ptClients, ptSessions, gymId, onSaveSession}){
  const emp = session.emp;
  const [portalTab, setPortalTab] = useState("dashboard");
  const [allData, setAllData]     = useState({});
  const [loadingData, setLoadingData] = useState(true);
  const [dayData, setDayData]     = useState(null);
  const [todayLoaded, setTodayLoaded] = useState(false);

  // Load all attendance for this employee
  useEffect(()=>{
    if(!allDates.length){setLoadingData(false);return;}
    setLoadingData(true);
    Promise.all(allDates.map(d=>window._loadAttendance(d,gymId||'gym_default').then(data=>[d,data]))).then(results=>{
      const map={};results.forEach(([d,data])=>{if(data)map[d]=data;});
      setAllData(map);setLoadingData(false);
    });
  },[allDates]);

  // Listen to today for punch in/out
  useEffect(()=>{
    const unsub = window._listenAttendance(today(), gymId||'gym_default', data=>{
      setDayData(data||{statuses:{},shifts:{},notes:{},punchIn:{},punchOut:{}});
      setTodayLoaded(true);
    });
    return ()=>unsub();
  },[]);

  const punchIn  = dayData?.punchIn?.[emp.id];
  const punchOut = dayData?.punchOut?.[emp.id];
  const todayStatus = dayData?.statuses?.[emp.id];

  const doPunchIn = async () => {
    if(punchIn) return;
    const t = nowTimeShort();
    const updated = {...(dayData||{}), punchIn:{...(dayData?.punchIn||{}),[emp.id]:t}, statuses:{...(dayData?.statuses||{}),[emp.id]:"Present"}};
    await window._saveAttendance(today(), updated);
    showToast("✓ Punched in at "+t);
  };

  const doPunchOut = async () => {
    if(!punchIn||punchOut) return;
    const t = nowTimeShort();
    const updated = {...dayData, punchOut:{...(dayData?.punchOut||{}),[emp.id]:t}};
    await window._saveAttendance(today(), updated);
    showToast("✓ Punched out at "+t);
  };

  // Stats
  let present=0,absent=0,halfDay=0,leave=0,totalMins=0;
  Object.values(allData).forEach(data=>{
    const s=(data?.statuses||{})[emp.id];
    const pin=(data?.punchIn||{})[emp.id];
    const pout=(data?.punchOut||{})[emp.id];
    if(s==="Present"||s==="Half Day") present++;
    if(s==="Absent") absent++;
    if(s==="Half Day") halfDay++;
    if(s==="Leave") leave++;
    if(pin&&pout){
      const pt=t=>{const[tm,ap]=t.split(" ");const[h,m]=(tm||"00:00").split(":").map(Number);let hr=h;if(ap==="PM"&&h!==12)hr+=12;if(ap==="AM"&&h===12)hr=0;return hr*60+m;};
      const d=pt(pout)-pt(pin); if(d>0)totalMins+=d;
    }
  });
  const total=present+absent+leave;
  const rate=total?Math.round(present/total*100):0;
  const myLeaves=leaveReqs.filter(r=>r.empId===emp.id).sort((a,b)=>b.submittedAt?.localeCompare(a.submittedAt||"")||0);

  const STATUS_COLOR={Present:"#00ff87",Absent:"#ff4d6d","Half Day":"#ffd60a",Leave:"#a78bfa"};

  return(
    <div>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
          <div style={{width:48,height:48,borderRadius:10,background:"rgba(167,139,250,0.15)",border:"1.5px solid rgba(167,139,250,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#a78bfa",flexShrink:0}}>{emp.avatar||makeAvatar(emp.name)}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",fontWeight:700}}>STAFF PORTAL</div>
            <div style={{fontSize:22,fontWeight:900,letterSpacing:1}}>{emp.name}</div>
            <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>{emp.role} · {emp.shift}</div>
          </div>
          <button onClick={onLogout} style={{cursor:"pointer",background:"rgba(255,77,109,0.1)",border:"1px solid rgba(255,77,109,0.3)",borderRadius:8,padding:"7px 12px",color:"#ff4d6d",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,letterSpacing:1}}>LOGOUT</button>
        </div>
        <div className="divider"/>
      </div>

      {/* Live Clock */}
      <LiveClock/>

      {/* Sub tabs */}
      <div className="tabs-bar" style={{marginBottom:20}}>
        {[["dashboard","Dashboard"],["myattend","My Attendance"],["pt","💪 My Clients"],["leave","Leave"]].map(([id,lbl])=>(
          <button key={id} className={`tab-btn${portalTab===id?" active":""}`} onClick={()=>setPortalTab(id)}>{lbl}</button>
        ))}
      </div>

      {/* DASHBOARD */}
      {portalTab==="dashboard"&&(
        <div>
          {/* Today punch */}
          <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"18px",marginBottom:16}}>
            <div style={{fontSize:11,color:"#4b5563",letterSpacing:2,fontFamily:"'Barlow',sans-serif",marginBottom:12}}>TODAY — {fmtDate(today())}</div>
            {todayStatus&&<div style={{marginBottom:12,display:"inline-block",background:`${STATUS_COLOR[todayStatus]}15`,border:`1px solid ${STATUS_COLOR[todayStatus]}`,borderRadius:6,padding:"4px 14px",fontSize:12,color:STATUS_COLOR[todayStatus],fontWeight:700,letterSpacing:1}}>{todayStatus.toUpperCase()}</div>}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {!punchIn
                ?<button className="punch-in-btn" style={{fontSize:13,padding:"10px 20px"}} onClick={doPunchIn}>🟢 PUNCH IN</button>
                :<span className="punch-active" style={{fontSize:12,padding:"8px 14px"}}>🟢 IN: {punchIn}</span>
              }
              {punchIn&&!punchOut
                ?<button className="punch-out-btn" style={{fontSize:13,padding:"10px 20px"}} onClick={doPunchOut}>🔴 PUNCH OUT</button>
                :punchIn&&punchOut

                :null
              }
              {punchIn&&!punchOut&&<DurationTicker punchIn={punchIn}/>}
            </div>
          </div>

          {/* Stats */}
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {[["Present",present,"#00ff87"],["Absent",absent,"#ff4d6d"],["Leave",leave,"#a78bfa"],["Attend %",rate+"%","#ff8c00"]].map(([l,v,c])=>(
              <div key={l} className="portal-stat">
                <div style={{fontSize:22,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
                <div style={{fontSize:9,color:"#4b5563",letterSpacing:1,fontFamily:"'Barlow',sans-serif",marginTop:3}}>{l}</div>
              </div>
            ))}
          </div>
          {totalMins>0&&<div style={{background:"rgba(255,214,10,0.06)",border:"1px solid rgba(255,214,10,0.15)",borderRadius:8,padding:"10px 16px",fontSize:13,color:"#ffd60a",fontFamily:"'Barlow',sans-serif",marginBottom:12}}>⏱ Total hours logged: <strong>{Math.floor(totalMins/60)}h {totalMins%60}m</strong></div>}
          {/* PT Client Summary */}
          {(()=>{
            const myPTClients=(ptClients||[]).filter(cl=>cl.trainerId===emp.id);
            if(!myPTClients.length)return null;
            const ptSess=ptSessions||[];
            const activePT=myPTClients.filter(cl=>ptSess.filter(s=>s.clientId===cl.id&&s.status==="done").length<Number(cl.totalSessions||0)).length;
            const feePending=myPTClients.filter(cl=>!cl.feePaid).length;
            return(<div onClick={()=>setPortalTab("pt")} style={{cursor:"pointer",background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",gap:14,transition:"border-color 0.2s"}} className="pt-client-card">
              <div style={{fontSize:28}}>💪</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#a78bfa"}}>My PT Clients</div>
                <div style={{fontSize:12,color:"#6b7280",fontFamily:"'Barlow',sans-serif",marginTop:2}}>{myPTClients.length} total · {activePT} active{feePending>0?" · "+feePending+" fee due":""}</div>
              </div>
              <div style={{color:"#a78bfa",fontSize:18}}>›</div>
            </div>);
          })()}
        </div>
      )}

      {/* MY ATTENDANCE */}
      {portalTab==="myattend"&&(
        <div>
          {loadingData
            ?<div style={{textAlign:"center",padding:"40px 0"}}><span className="spinner"></span></div>
            :Object.keys(allData).length===0
            ?<div className="empty"><div style={{fontSize:42,marginBottom:12}}>📋</div><div style={{fontSize:16,letterSpacing:2}}>NO RECORDS YET</div></div>
            :Object.keys(allData).sort((a,b)=>b.localeCompare(a)).map((d,i)=>{
              const data=allData[d];
              const s=(data?.statuses||{})[emp.id];
              const pin2=(data?.punchIn||{})[emp.id];
              const pout2=(data?.punchOut||{})[emp.id];
              const col=s?STATUS_COLOR[s]:"#374151";
              return(
                <div key={d} style={{background:"rgba(255,255,255,0.025)",border:`1px solid ${col}25`,borderRadius:10,padding:"12px 16px",marginBottom:8,animation:"slide-in 0.3s ease both",animationDelay:`${i*0.04}s`}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:700}}>{fmtDate(d)}</div>
                      {pin2&&<div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif",marginTop:2}}>In: {pin2}{pout2?" · Out: "+pout2:""}</div>}
                    </div>
                    {s?<span style={{background:`${col}15`,border:`1px solid ${col}`,borderRadius:5,padding:"3px 10px",fontSize:11,color:col,fontWeight:700,letterSpacing:1}}>{s.toUpperCase()}</span>

        const myClients=(ptClients||[]).filter(cl=>cl.trainerId===emp.id);

        const doneSess=(cid)=>ptSess.filter(s=>s.clientId===cid&&s.status==="done").length;
        const missedSess=(cid)=>ptSess.filter(s=>s.clientId===cid&&s.status==="missed").length;
        const getStatus=(cid,dt)=>(ptSess.find(s=>s.clientId===cid&&s.date===dt)||{}).status||"";
        const toggleSess=async(cid,dt,cur)=>{
          const id="pts_"+cid+"_"+dt;
          const next=cur==="done"?"missed":cur==="missed"?"":"done";
          await onSaveSession(id,{clientId:cid,date:dt,status:next||"none",id});
        };
        const last14=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return d.toISOString().split("T")[0];});
        if(myClients.length===0)return(
          <div className="empty"><div style={{fontSize:42,marginBottom:12}}>💪</div><div style={{fontSize:16,letterSpacing:2}}>NO CLIENTS ASSIGNED</div><div style={{fontSize:12,color:"#4b5563",fontFamily:"'Barlow',sans-serif",marginTop:8}}>Ask the owner to assign PT clients to you</div></div>
        );
        return(<div>
          <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:12,fontWeight:700}}>MY PT CLIENTS — {myClients.length}</div>
          {myClients.map((cl,ci)=>{
            const done=doneSess(cl.id); const missed=missedSess(cl.id); const total=Number(cl.totalSessions||0);
            const pct=total>0?Math.round(done/total*100):0;
            return(<div key={cl.id} className="pt-client-card" style={{animationDelay:ci*0.05+"s"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>

            </div>);
