<head>
  <meta charset="UTF-8" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>Surya Gym 2.0 — Attendance</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyCqvx_WIP4Rgs4YvaAzLRc5WDZOMCmPWNI",
      authDomain: "surya-gym-attendance-267b8.firebaseapp.com",
      projectId: "surya-gym-attendance-267b8",
      storageBucket: "surya-gym-attendance-267b8.firebasestorage.app",
      messagingSenderId: "966870024989",
      appId: "1:966870024989:web:0ba8546b99aea0a756d7f4"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    // Multi-gym: prefix = gymId, e.g. "gym1_attendance_2024-01-01"
    const P = (g,col) => g+"_"+col; // path helper
    window._saveAttendance    = async (k,d,g)  => await setDoc(doc(db,P(g,"attendance"),k),d);
    window._loadAttendance    = async (k,g)    => { const s=await getDoc(doc(db,P(g,"attendance"),k)); return s.exists()?s.data():null; };
    window._listenAttendance  = (k,g,cb)       => onSnapshot(doc(db,P(g,"attendance"),k),s=>cb(s.exists()?s.data():null));
    window._loadAllDates      = async (g)      => { const s=await getDocs(collection(db,P(g,"attendance"))); return s.docs.map(d=>d.id); };
    window._saveStaff         = async (s,g)    => await setDoc(doc(db,P(g,"config"),"staff"),{list:s});
    window._listenStaff       = (g,cb)         => onSnapshot(doc(db,P(g,"config"),"staff"),s=>cb(s.exists()?s.data().list:null));
    window._savePayroll       = async (k,d,g)  => await setDoc(doc(db,P(g,"payroll"),k),d);
    window._loadPayroll       = async (k,g)    => { const s=await getDoc(doc(db,P(g,"payroll"),k)); return s.exists()?s.data():null; };
    window._saveSalaryConfig  = async (d,g)    => await setDoc(doc(db,P(g,"config"),"salaries"),d);
    window._listenSalaryConfig= (g,cb)         => onSnapshot(doc(db,P(g,"config"),"salaries"),s=>cb(s.exists()?s.data():{}));
    window._saveLeaveReq      = async (id,d,g) => await setDoc(doc(db,P(g,"leaves"),id),d);
    window._listenLeaveReqs   = (g,cb)         => onSnapshot(collection(db,P(g,"leaves")),s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))));
    window._saveGymList       = async (list)   => await setDoc(doc(db,"_gyms","registry"),{list});
    window._listenGymList     = (cb)           => onSnapshot(doc(db,"_gyms","registry"),s=>cb(s.exists()?(s.data().list||[]):[]));
    window._savePTClient      = async (id,d,g) => await setDoc(doc(db,P(g,"ptclients"),id),d);
    window._deletePTClient    = async (id,g)   => { await deleteDoc(doc(db,P(g,"ptclients"),id)); };
    window._listenPTClients   = (g,cb)         => onSnapshot(collection(db,P(g,"ptclients")),s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))));
    window._savePTSession     = async (id,d,g) => await setDoc(doc(db,P(g,"ptsessions"),id),d);
    window._listenPTSessions  = (g,cb)         => onSnapshot(collection(db,P(g,"ptsessions")),s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))));
    // Members
    window._saveMember       = async (id,d,g) => await setDoc(doc(db,P(g,"members"),id),d);
    window._deleteMember     = async (id,g)   => { await deleteDoc(doc(db,P(g,"members"),id)); };
    window._listenMembers    = (g,cb)         => onSnapshot(collection(db,P(g,"members")),s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))));
    window._saveMemberAttend = async (date,d,g) => await setDoc(doc(db,P(g,"memberattend"),date),d);
    window._loadMemberAttend = async (date,g)   => { const s=await getDoc(doc(db,P(g,"memberattend"),date)); return s.exists()?s.data():null; };
    window._listenMemberAttend=(date,g,cb)    => onSnapshot(doc(db,P(g,"memberattend"),date),s=>cb(s.exists()?s.data():null));
    window._saveGymConfig    = async (d,g)    => await setDoc(doc(db,P(g,"config"),"gymconfig"),d);
    window._listenGymConfig  = (g,cb)         => onSnapshot(doc(db,P(g,"config"),"gymconfig"),s=>cb(s.exists()?s.data():{}));
    window._fbReady = true;
    window.dispatchEvent(new Event("firebaseReady"));
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080c10;color:#e8edf2;font-family:'Barlow Condensed',sans-serif}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#ff4d00;border-radius:2px}
    @keyframes slide-in{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes flame{0%,100%{transform:scaleY(1) rotate(-1deg)}50%{transform:scaleY(1.05) rotate(1deg)}}
    @keyframes save-flash{0%{background:#ff4d00}50%{background:#00ff87}100%{background:#ff4d00}}
    @keyframes toast-in{from{opacity:0;transform:translateY(20px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes modal-in{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
    @keyframes clock-pulse{0%,100%{opacity:1}50%{opacity:0.6}}
    .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,77,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,77,0,0.04) 1px,transparent 1px);background-size:40px 40px}
    .glow{position:fixed;top:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,77,0,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:24px 16px}
    .status-btn{cursor:pointer;border:1.5px solid transparent;border-radius:4px;padding:5px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;transition:all 0.15s;background:rgba(255,255,255,0.04);color:#6b7280}
    .status-btn:hover{opacity:0.85;transform:translateY(-1px)}
    .btn-Present.active{background:rgba(0,255,135,0.15);border-color:#00ff87;color:#00ff87}
    .btn-Absent.active{background:rgba(255,77,109,0.15);border-color:#ff4d6d;color:#ff4d6d}
    .btn-HalfDay.active{background:rgba(255,214,10,0.15);border-color:#ffd60a;color:#ffd60a}
    .btn-Leave.active{background:rgba(167,139,250,0.15);border-color:#a78bfa;color:#a78bfa}
    .tab-btn{cursor:pointer;background:none;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1.5px;padding:10px 16px;color:#4b5563;border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase}
    .tab-btn.active{color:#ff4d00;border-bottom-color:#ff4d00}
    .tab-btn:hover{color:#e8edf2}
    .emp-row{animation:slide-in 0.3s ease both;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:border-color 0.2s}
    .emp-row:hover{border-color:rgba(255,77,0,0.25)}
    .save-btn{cursor:pointer;background:linear-gradient(135deg,#ff4d00,#ff8c00);border:none;border-radius:8px;padding:14px 36px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:3px;color:white;text-transform:uppercase;transition:all 0.2s;box-shadow:0 4px 20px rgba(255,77,0,0.35)}
    .save-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,77,0,0.5)}
    .save-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .save-btn.flashing{animation:save-flash 0.6s ease}
    .stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 10px;text-align:center;flex:1;transition:transform 0.2s}
    .stat-card:hover{transform:translateY(-3px)}
    input[type=date],input[type=text],input[type=password]{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,77,0,0.3);border-radius:6px;color:#e8edf2;font-family:'Barlow Condensed',sans-serif;font-size:14px;padding:7px 10px;outline:none;width:100%}
    input[type=date]{width:auto}
    input[type=text]:focus,input[type=password]:focus,input[type=date]:focus{border-color:#ff4d00}
    select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#9ca3af;font-family:'Barlow',sans-serif;font-size:12px;padding:7px 8px;outline:none;cursor:pointer;width:100%;border-radius:5px}
    select:focus{border-color:#ff4d00}
    textarea{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:5px;color:#9ca3af;font-family:'Barlow',sans-serif;font-size:12px;padding:6px 8px;outline:none;resize:none;width:100%}
    textarea:focus{border-color:#ff4d00}
    .divider{height:2px;background:linear-gradient(90deg,#ff4d00,#ff8c0060,transparent);margin-bottom:6px}
    .tabs-bar{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:24px;flex-wrap:wrap}
    .stats-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .row-flex{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .empty{text-align:center;padding:60px 0;color:#374151}
    .badge-saved{font-size:10px;background:rgba(0,255,135,0.1);color:#00ff87;border:1px solid #00ff87;border-radius:4px;padding:3px 8px;letter-spacing:1px}
    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff4d00,#ff8c00);color:white;border-radius:8px;padding:12px 28px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;box-shadow:0 8px 30px rgba(255,77,0,0.5);animation:toast-in 0.3s ease;z-index:100;white-space:nowrap}
    .note-link{background:none;border:none;cursor:pointer;color:#374151;font-size:11px;font-family:'Barlow',sans-serif;padding:0}
    .note-link:hover{color:#6b7280}
    .hist-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s}
    .hist-card:hover{border-color:rgba(255,77,0,0.3)}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.15);border-top-color:#ff4d00;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:#00ff87;display:inline-block;margin-right:5px;box-shadow:0 0 5px #00ff87}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#0d1117;border:1px solid rgba(255,77,0,0.3);border-radius:16px;padding:28px;width:100%;max-width:480px;animation:modal-in 0.25s ease;max-height:90vh;overflow-y:auto}
    .modal-title{font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;color:#ff4d00}
    .field-label{font-size:11px;color:#6b7280;letter-spacing:1px;margin-bottom:6px;font-family:'Barlow',sans-serif;text-transform:uppercase}
    .field-group{margin-bottom:14px}
    .staff-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px;margin-bottom:10px}
    .icon-btn{background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;font-size:14px;transition:all 0.15s}
    .del-btn{color:#ff4d6d}
    .del-btn:hover{background:rgba(255,77,109,0.1)}
    .add-staff-btn{cursor:pointer;background:rgba(255,77,0,0.1);border:1.5px dashed rgba(255,77,0,0.4);border-radius:8px;padding:12px;width:100%;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;color:#ff8c00;text-transform:uppercase;transition:all 0.2s;margin-bottom:16px}
    .add-staff-btn:hover{background:rgba(255,77,0,0.2)}
    .err-msg{color:#ff4d6d;font-size:12px;font-family:'Barlow',sans-serif;margin-top:6px}

    /* Clock */
    .live-clock{background:rgba(255,255,255,0.03);border:1px solid rgba(255,77,0,0.2);border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .clock-time{font-size:36px;font-weight:900;letter-spacing:3px;color:#ff8c00;font-family:'Barlow Condensed',sans-serif;animation:clock-pulse 2s ease-in-out infinite}
    .clock-date{font-size:13px;color:#6b7280;font-family:'Barlow',sans-serif}
    .clock-label{font-size:9px;color:#4b5563;letter-spacing:2px;text-transform:uppercase}

    /* Punch buttons */
    .punch-in-btn{cursor:pointer;background:rgba(0,255,135,0.12);border:1.5px solid #00ff87;border-radius:6px;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;color:#00ff87;transition:all 0.15s;white-space:nowrap}
    .punch-in-btn:hover{background:rgba(0,255,135,0.22)}
    .punch-out-btn{cursor:pointer;background:rgba(255,77,109,0.12);border:1.5px solid #ff4d6d;border-radius:6px;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;color:#ff4d6d;transition:all 0.15s;white-space:nowrap}
    .punch-out-btn:hover{background:rgba(255,77,109,0.22)}
    .punch-time{font-size:11px;font-family:'Barlow',sans-serif;color:#6b7280}
    .punch-active{font-size:10px;background:rgba(0,255,135,0.08);border:1px solid rgba(0,255,135,0.2);border-radius:4px;padding:3px 8px;color:#00ff87;font-family:'Barlow',sans-serif}
    .duration{font-size:11px;color:#ffd60a;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px}
    .cancel-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;color:#6b7280;cursor:pointer;flex:1}

    /* Login */
    @keyframes login-in{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:login-in 0.5s ease}
    .login-box{width:100%;max-width:400px;background:#0d1117;border:1px solid rgba(255,77,0,0.25);border-radius:20px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
    .login-role-btn{cursor:pointer;border-radius:12px;padding:16px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;transition:all 0.2s;border:1.5px solid transparent;width:100%;text-align:left;display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .login-role-btn:hover{transform:translateX(4px)}
    .login-role-owner{background:rgba(255,77,0,0.1);border-color:rgba(255,77,0,0.3);color:#ff8c00}
    .login-role-owner:hover{background:rgba(255,77,0,0.2);border-color:#ff4d00}
    .login-role-staff{background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.25);color:#a78bfa}
    .login-role-staff:hover{background:rgba(167,139,250,0.15);border-color:#a78bfa}
    .pin-display{display:flex;gap:8px;justify-content:center;margin:20px 0}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);transition:all 0.15s}
    .pin-dot.filled{background:#ff8c00;border-color:#ff8c00;box-shadow:0 0 8px rgba(255,140,0,0.5)}
    .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
    .pin-btn{cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:#e8edf2;transition:all 0.15s}
    .pin-btn:hover{background:rgba(255,77,0,0.15);border-color:rgba(255,77,0,0.4);color:#ff8c00}
    .pin-btn:active{transform:scale(0.95)}
    .pin-btn.zero{grid-column:2}
    .role-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px}
    .role-badge.owner{background:rgba(255,77,0,0.15);border:1px solid rgba(255,77,0,0.4);color:#ff8c00}
    .role-badge.staff{background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.3);color:#a78bfa}
    .staff-portal-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px 18px;margin-bottom:10px}
    .portal-stat{background:rgba(0,0,0,0.2);border-radius:8px;padding:10px;text-align:center;flex:1}
    /* WhatsApp */
    .wa-btn{cursor:pointer;background:rgba(37,211,102,0.1);border:1.5px solid rgba(37,211,102,0.4);border-radius:6px;padding:5px 11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;color:#25d366;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .wa-btn:hover{background:rgba(37,211,102,0.2);border-color:#25d366}
    .wa-bulk-btn{cursor:pointer;background:rgba(37,211,102,0.1);border:1.5px solid rgba(37,211,102,0.35);border-radius:8px;padding:9px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;color:#25d366;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
    .wa-bulk-btn:hover{background:rgba(37,211,102,0.2)}
    /* Export */
    .export-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:20px;margin-bottom:12px}
    .export-btn{cursor:pointer;border-radius:10px;padding:14px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;transition:all 0.2s;border:1.5px solid;width:100%;text-align:left;display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .export-btn:hover{transform:translateY(-2px)}
    .export-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .export-excel{background:rgba(0,196,84,0.1);border-color:rgba(0,196,84,0.4);color:#00c454}
    .export-excel:hover{background:rgba(0,196,84,0.2);border-color:#00c454}
    .export-pdf{background:rgba(255,77,0,0.1);border-color:rgba(255,77,0,0.4);color:#ff6b35}
    .export-pdf:hover{background:rgba(255,77,0,0.2);border-color:#ff4d00}
    .export-month-select{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:8px;color:#e8edf2;font-family:'Barlow Condensed',sans-serif;font-size:15px;padding:10px 14px;outline:none;width:100%;cursor:pointer}
    .export-month-select:focus{border-color:#ff4d00}
    .preview-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px}
    .preview-table th{background:rgba(255,77,0,0.15);color:#ff8c00;padding:7px 10px;text-align:left;letter-spacing:1px;font-size:10px;border:1px solid rgba(255,255,255,0.06)}
    .preview-table td{padding:7px 10px;border:1px solid rgba(255,255,255,0.05);color:#9ca3af;font-family:'Barlow',sans-serif}
    .preview-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}

    /* Members */

<body>
<div class="grid-bg"></div>
<div class="glow"></div>
<div class="wrap" id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const ADMIN_PASSWORD = "2020";
const DEFAULT_STAFF = [
  { id:"emp1", name:"Sai Vaidya",    role:"Trainer",   avatar:"SV", shift:"Morning (6AM–10AM)",   pin:"1111", phone:"" },
  { id:"emp2", name:"Karan Honmane", role:"Reception", avatar:"KH", shift:"Afternoon (11AM–4PM)", pin:"2222", phone:"" },
  { id:"emp3", name:"Aniket Mane",   role:"Trainer",   avatar:"AM", shift:"Evening (5PM–10PM)",   pin:"3333", phone:"" },
];
const SHIFTS = ["Morning (6AM–10AM)","Afternoon (11AM–4PM)","Evening (5PM–10PM)"];
const STATUS_CFG = {
  Present:   {color:"#00ff87",bg:"rgba(0,255,135,0.12)"},
  Absent:    {color:"#ff4d6d",bg:"rgba(255,77,109,0.12)"},
  "Half Day":{color:"#ffd60a",bg:"rgba(255,214,10,0.12)"},
  Leave:     {color:"#a78bfa",bg:"rgba(167,139,250,0.12)"},
};

function today(){ return new Date().toISOString().split("T")[0]; }
function fmtDate(d){ return new Date(d+"T00:00:00").toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}); }
function makeAvatar(name){ return name.split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2); }
function makeId(){ return "emp"+Date.now(); }
function openWA(phone, msg){
  if(!phone||phone.length<10){ alert("No WhatsApp number set.\nGo to Edit Staff to add their number."); return; }
  const num = "91"+String(phone).replace(/[^0-9]/g,"");
  window.open("https://wa.me/"+num+"?text="+encodeURIComponent(msg),"_blank");
}
function nowTime(){
  const n=new Date();
  return n.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:true});
}
function nowTimeShort(){
  const n=new Date();
  return n.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true});
}
function calcDuration(punchIn){
  if(!punchIn) return null;
  const [time,ampm]=punchIn.split(" ");
  const [h,m,s]=(time||"00:00:00").split(":").map(Number);
  let hrs=h; if(ampm==="PM"&&h!==12)hrs+=12; if(ampm==="AM"&&h===12)hrs=0;
  const inMs=new Date(); inMs.setHours(hrs,m,s||0,0);
  const diffMs=Date.now()-inMs.getTime();
  if(diffMs<0) return null;
  const totalMins=Math.floor(diffMs/60000);
  const dh=Math.floor(totalMins/60), dm=totalMins%60;
  return dh>0?`${dh}h ${dm}m`:`${dm}m`;
}

/* ── LIVE CLOCK ── */
function LiveClock(){
  const [time,setTime]=useState(nowTime());
  useEffect(()=>{
    const t=setInterval(()=>setTime(nowTime()),1000);
    return()=>clearInterval(t);
  },[]);
  const now=new Date();
  const dateStr=now.toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  return(
    <div className="live-clock">
      <div>
        <div className="clock-label">LIVE TIME</div>
        <div className="clock-time">{time}</div>
        <div className="clock-date">{dateStr}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div className="clock-label">STATUS</div>
        <div style={{marginTop:4}}><span className="sync-dot"></span><span style={{fontSize:11,color:"#00ff87",fontFamily:"'Barlow',sans-serif"}}>LIVE SYNC ON</span></div>
        <div style={{fontSize:11,color:"#4b5563",fontFamily:"'Barlow',sans-serif",marginTop:4}}>Surya Gym 2.0</div>
      </div>
    </div>
  );
}

/* ── DURATION TICKER ── */
function DurationTicker({punchIn}){
  const [dur,setDur]=useState(calcDuration(punchIn));
  useEffect(()=>{
    const t=setInterval(()=>setDur(calcDuration(punchIn)),30000);
    return()=>clearInterval(t);
  },[punchIn]);
  if(!dur) return null;
  return <span className="duration">⏱ {dur}</span>;
}

/* ── PASSWORD MODAL ── */
function PasswordModal({onSuccess,onClose}){
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const check=()=>{ if(pwd===ADMIN_PASSWORD){onSuccess();}else{setErr("Wrong password!");setPwd("");} };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">🔒 Admin Access</div>
        <div className="field-group">
          <div className="field-label">Enter Password</div>
          <input type="password" placeholder="Password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&check()} autoFocus/>
          {err&&<div className="err-msg">{err}</div>}
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="save-btn" style={{flex:1,padding:"12px"}} onClick={check}>UNLOCK</button>
          <button className="cancel-btn" onClick={onClose}>CANCEL</button>
        </div>
      </div>
    </div>
  );
}

/* ── STAFF EDITOR ── */
function StaffEditor({staff,onSave,onClose}){
  const [list,setList]=useState(staff.map(e=>({...e})));
  const [saving,setSaving]=useState(false);
  const upd=(id,f,v)=>setList(p=>p.map(e=>e.id===id?{...e,[f]:v,avatar:f==="name"?makeAvatar(v):e.avatar}:e));
  const doSave=async()=>{
    const valid=list.filter(e=>e.name.trim()&&e.role.trim());
    if(!valid.length){alert("Add at least one staff!");return;}
    setSaving(true); await onSave(valid); setSaving(false); onClose();
  };
  return(
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-title">✏️ Edit Staff</div>
        {list.map((emp,i)=>(
          <div key={emp.id} className="staff-card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:700,color:"#ff8c00",letterSpacing:1}}>STAFF #{i+1}</div>
              <button className="icon-btn del-btn" onClick={()=>setList(p=>p.filter(e=>e.id!==emp.id))}>🗑 Remove</button>
            </div>
            <div className="field-group">
              <div className="field-label">Full Name</div>
              <input type="text" placeholder="e.g. Sai Vaidya" value={emp.name} onChange={e=>upd(emp.id,"name",e.target.value)}/>
            </div>
            <div className="field-group">
              <div className="field-label">Role</div>
              <input type="text" placeholder="e.g. Trainer" value={emp.role} onChange={e=>upd(emp.id,"role",e.target.value)}/>
            </div>
            <div className="field-group">
              <div className="field-label">Default Shift Timing (type freely)</div>
              <input type="text" placeholder="e.g. 6AM–10AM or 5PM–9PM" value={emp.shift} onChange={e=>upd(emp.id,"shift",e.target.value)}/>
            </div>
            <div className="field-group">
              <div className="field-label">Staff Login PIN (4 digits)</div>
              <input type="text" maxLength={4} placeholder="e.g. 1234" value={emp.pin||""} onChange={e=>upd(emp.id,"pin",e.target.value.replace(/\D/g,"").slice(0,4))} style={{letterSpacing:8,fontSize:18,fontWeight:700}}/>
              <div style={{fontSize:10,color:"#4b5563",fontFamily:"'Barlow',sans-serif",marginTop:4}}>Staff uses this PIN to login to their portal</div>
            </div>
            <div className="field-group">
              <div className="field-label">WhatsApp Phone Number</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"#25d366",fontWeight:700,fontSize:14}}>+91</span>
                <input type="text" placeholder="9876543210" maxLength={10} value={emp.phone||""} onChange={e=>upd(emp.id,"phone",e.target.value.replace(/[^0-9]/g,"").slice(0,10))} style={{flex:1,letterSpacing:2}}/>
              </div>
              <div style={{fontSize:10,color:"#4b5563",fontFamily:"'Barlow',sans-serif",marginTop:4}}>For sending attendance and salary notifications</div>
            </div>
          </div>
        ))}
        <button className="add-staff-btn" onClick={()=>setList(p=>[...p,{id:makeId(),name:"",role:"",avatar:"",shift:SHIFTS[0]}])}>+ ADD NEW STAFF</button>
        <div style={{display:"flex",gap:10}}>
          <button className="save-btn" style={{flex:1,padding:"12px"}} onClick={doSave} disabled={saving}>
            {saving?<><span className="spinner"></span>SAVING...</>:"SAVE CHANGES"}
          </button>
          <button className="cancel-btn" onClick={onClose}>CANCEL</button>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */

  },[]);

  useEffect(()=>{

  },[fbReady]);

  useEffect(()=>{
    if(!fbReady)return;

    window._listenSalaryConfig(activeGymId,data=>setSalaryConfig(data||{}));
    window._listenLeaveReqs(activeGymId,data=>setLeaveReqs(data||[]));
    window._listenPTClients(activeGymId,data=>setPtClients(data||[]));
    window._listenPTSessions(activeGymId,data=>setPtSessions(data||[]));
    window._listenMembers(activeGymId,data=>setMembers(data||[]));
    window._listenGymConfig(activeGymId,data=>setGymConfig(data||{}));
    return()=>{ if(unsubSRef.current)unsubSRef.current(); };
  },[fbReady,activeGymId]);

  useEffect(()=>{
    if(!fbReady)return;
    setLoading(true);
    if(unsubRef.current)unsubRef.current();
    window._listenMemberAttend(date,activeGymId,data=>setMemberAttend(data));
    unsubRef.current=window._listenAttendance(date,activeGymId,data=>{
      setDayData(data||{statuses:{},shifts:Object.fromEntries(staff.map(e=>[e.id,e.shift])),notes:{},punchIn:{},punchOut:{}});
      setLoading(false);
    });
    return()=>{ if(unsubRef.current)unsubRef.current(); };
  },[fbReady,date,activeGymId]);

  const statuses  = dayData?.statuses ||{};
  const dayShifts = dayData?.shifts   ||Object.fromEntries(staff.map(e=>[e.id,e.shift]));
  const dayNotes  = dayData?.notes    ||{};

  const punchOut  = dayData?.punchOut ||{};

  const upd=(field,id,val)=>setDayData(p=>({...p,[field]:{...(p?.[field]||{}),[id]:val}}));

  const doPunchIn=(id)=>{
    if(punchIn[id]){return;}
    const t=nowTimeShort();
    upd("punchIn",id,t);
    upd("statuses",id,"Present");
    showToast(`✓ ${staff.find(e=>e.id===id)?.name} punched in at ${t}`);
  };

  const doPunchOut=(id)=>{
    if(!punchIn[id]||punchOut[id]){return;}
    const t=nowTimeShort();
    upd("punchOut",id,t);
    showToast(`✓ ${staff.find(e=>e.id===id)?.name} punched out at ${t}`);
  };

  const doSave=async()=>{
    setSaving(true);
    try{
      await window._saveAttendance(date,dayData,activeGymId);
      setAllDates(p=>p.includes(date)?p:[date,...p].sort((a,b)=>b.localeCompare(a)));

      showToast("✓ Saved & synced to all phones!");
    }catch(e){showToast("❌ Save failed. Check connection.");}

  const doSaveStaff=async(s)=>{ await window._saveStaff(s,activeGymId); setStaff(s); showToast("✓ Staff updated on all phones!"); };

  const todayCheckedIn = (memberAttend?.checked||[]).length;
  const stats={
    total:staff.length, marked:Object.keys(statuses).length,

  if(session.role==="member") return(

      onSaveMemberAttend={async(date,d)=>await window._saveMemberAttend(date,d,activeGymId)}
      loadMemberAttend={(date)=>window._loadMemberAttend(date,activeGymId)}
    />
  );

  // Show staff portal for staff role
  if(session.role==="staff") return(
    <div className="wrap">
      <StaffPortal
        session={session} staff={staff} allDates={allDates}
        leaveReqs={leaveReqs} showToast={showToast}
        ptClients={ptClients} ptSessions={ptSessions} gymId={activeGymId}
        onSaveSession={async(id,d)=>await window._savePTSession(id,d,activeGymId)}
        onApprove={async(req)=>{
          const updated={...req,status:"approved",updatedAt:new Date().toISOString()};
          await window._saveLeaveReq(req.id,updated,'gym_default');
          req.dates.forEach(async(d)=>{
            const existing=await window._loadAttendance(d,'gym_default')||{statuses:{},shifts:Object.fromEntries(staff.map(e=>[e.id,e.shift])),notes:{},punchIn:{},punchOut:{}};
            existing.statuses[req.empId]="Leave";
            existing.notes[req.empId]="Approved: "+req.reason;
            await window._saveAttendance(d,existing,'gym_default');
          });
          showToast("✓ Leave approved!");
        }}
        onReject={async(req)=>{ await window._saveLeaveReq(req.id,{...req,status:"rejected",updatedAt:new Date().toISOString()}); showToast("✗ Leave rejected."); }}
        onLogout={()=>setSession(null)}
      />
    </div>
  );

  return(<div>
    {showPwd&&<PasswordModal onSuccess={()=>{setShowPwd(false);setShowEditor(true);}} onClose={()=>setShowPwd(false)}/>}
    {showEditor&&<StaffEditor staff={staff} onSave={doSaveStaff} onClose={()=>setShowEditor(false)}/>}
    {showGymMgr&&<GymManager gymList={gymList} activeGymId={activeGymId} onSwitch={(id)=>{setActiveGymId(id);setAllDates([]);setStaff(DEFAULT_STAFF);setTab("mark");showToast("Switched to "+gymList.find(g=>g.id===id)?.name);}} onSave={async(list)=>{await window._saveGymList(list);setGymList(list);}} onClose={()=>setShowGymMgr(false)}/>}

    {/* Header */}
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:8}}>
        <div style={{width:54,height:54,flexShrink:0,animation:"flame 3s ease-in-out infinite"}}>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="54" height="54">
            <defs>
              <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#fff7a0"/><stop offset="40%" stopColor="#ffb700"/><stop offset="100%" stopColor="#ff4d00"/>
              </radialGradient>
              <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#ffffff"/><stop offset="100%" stopColor="#ffd60a"/>
              </radialGradient>
              <filter id="glowF"><feGaussianBlur stdDeviation="2.5" result="cb"/><feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>

              <line x1="50" y1="82" x2="50" y2="95" stroke="#ff8c00" strokeWidth="3.5" strokeLinecap="round"/>
              <line x1="5" y1="50" x2="18" y2="50" stroke="#ff8c00" strokeWidth="3.5" strokeLinecap="round"/>
              <line x1="82" y1="50" x2="95" y2="50" stroke="#ff8c00" strokeWidth="3.5" strokeLinecap="round"/>
              <line x1="16" y1="16" x2="25" y2="25" stroke="#ff8c00" strokeWidth="3.5" strokeLinecap="round"/>
              <line x1="75" y1="75" x2="84" y2="84" stroke="#ff8c00" strokeWidth="3.5" strokeLinecap="round"/>
              <line x1="84" y1="16" x2="75" y2="25" stroke="#ff8c00" strokeWidth="3.5" strokeLinecap="round"/>

        </div>
        <div style={{marginLeft:"auto",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>

              ✏️ EDIT STAFF
            </button>
            <button onClick={()=>setSession(null)} style={{cursor:"pointer",background:"rgba(255,77,109,0.08)",border:"1px solid rgba(255,77,109,0.25)",borderRadius:8,padding:"5px 12px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,letterSpacing:1,color:"#ff4d6d"}}>
              LOGOUT
            </button>
          </div>
        </div>
      </div>
      <div className="divider"/>
    </div>

    {/* Live Clock */}
    <LiveClock/>

    {/* Stats */}
    <div className="stats-bar">
      {[["Total",stats.total,"#e8edf2"],["Present",stats.present,"#00ff87"],["Absent",stats.absent,"#ff4d6d"],["Half Day",stats.halfDay,"#ffd60a"],["On Leave",stats.leave,"#a78bfa"],["Marked",`${stats.marked}/${stats.total}`,"#ff8c00"]].map(([l,v,c])=>(

          <div style={{fontSize:22,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
          <div style={{fontSize:9,color:"#6b7280",letterSpacing:1,marginTop:3,fontFamily:"'Barlow',sans-serif",textTransform:"uppercase"}}>{l}</div>

          <input type="date" value={date} onChange={e=>setDate(e.target.value)} max={today()} style={{width:"auto"}}/>
          {allDates.includes(date)&&<span className="badge-saved">✓ SAVED</span>}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <button className="status-btn" onClick={()=>{
            const u={};staff.forEach(e=>u[e.id]="Present");
            setDayData(p=>({...p,statuses:{...(p?.statuses||{}),...u}}));
          }}>✓ ALL PRESENT</button>
          <button className="wa-bulk-btn" onClick={()=>{
            const dateStr=fmtDate(date);
            const lines=staff.map(e=>"- "+e.name+": "+(statuses[e.id]||"Not Marked")+(punchIn[e.id]?" (In: "+punchIn[e.id]+(punchOut[e.id]?" Out: "+punchOut[e.id]:"")+")" :"")).join("\n");
            const msg="Surya Gym 2.0 - Attendance Report\n"+dateStr+"\n\n"+lines+"\n\nSurya Gym 2.0";
            const withPhone=staff.filter(e=>e.phone&&e.phone.length>=10);
            if(!withPhone.length){alert("No WhatsApp numbers set.\nGo to Edit Staff to add numbers.");return;}
            withPhone.forEach(e=>openWA(e.phone,msg));
            showToast("WhatsApp opened for "+withPhone.length+" staff!");

      {loading
        ?<div style={{textAlign:"center",padding:"40px 0"}}><span className="spinner"></span><span style={{color:"#6b7280",fontFamily:"'Barlow',sans-serif",fontSize:13}}>Loading...</span></div>
        :staff.map((emp,i)=>{
          const status  = statuses[emp.id];
          const shift   = dayShifts[emp.id]||emp.shift||"";
          const note    = dayNotes[emp.id]||"";
          const pinTime = punchIn[emp.id];
          const poutTime= punchOut[emp.id];
          const cfg     = status?STATUS_CFG[status]:null;
          const isToday = date===today();
          return(
            <div key={emp.id} className="emp-row" style={{animationDelay:`${i*0.06}s`,borderColor:cfg?`${cfg.color}30`:"rgba(255,255,255,0.06)"}}>
              {/* Top row */}
              <div className="row-flex">
                <div style={{width:42,height:42,borderRadius:8,flexShrink:0,background:cfg?cfg.bg:"rgba(255,255,255,0.06)",border:`1.5px solid ${cfg?cfg.color:"rgba(255,255,255,0.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:cfg?cfg.color:"#6b7280"}}>{emp.avatar||makeAvatar(emp.name)}</div>
                <div style={{flex:"0 0 140px"}}>
                  <div style={{fontSize:16,fontWeight:700}}>{emp.name}</div>
                  <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>{emp.role}</div>
                  <div style={{fontSize:10,color:"#4b5563",fontFamily:"'Barlow',sans-serif",marginTop:2}}>⏰ {shift}</div>
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {["Present","Absent","Half Day","Leave"].map(s=>(
                    <button key={s} className={`status-btn btn-${s.replace(" ","")}${status===s?" active":""}`} onClick={()=>upd("statuses",emp.id,s)}>
                      {s==="Present"?"✓":s==="Absent"?"✗":s==="Half Day"?"½":"◎"} {s.toUpperCase()}
                    </button>
                  ))}
                </div>
                <div style={{flex:"0 0 170px",marginLeft:"auto"}}>
                  <input type="text" placeholder="Shift timing..." value={shift} onChange={e=>upd("shifts",emp.id,e.target.value)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:5,color:"#9ca3af",fontFamily:"'Barlow',sans-serif",fontSize:12,padding:"7px 8px",outline:"none",width:"100%"}}/>
                </div>
              </div>

              {/* Punch In/Out Row */}
              <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  {!pinTime
                    ?<button className="punch-in-btn" onClick={()=>isToday&&doPunchIn(emp.id)} style={{opacity:isToday?1:0.4,cursor:isToday?"pointer":"not-allowed"}}>
                       🟢 PUNCH IN
                     </button>
                    :<span className="punch-active">🟢 IN: {pinTime}</span>
                  }
                  {pinTime&&!poutTime
                    ?<button className="punch-out-btn" onClick={()=>doPunchOut(emp.id)}>🔴 PUNCH OUT</button>
                    :pinTime&&poutTime
                    ?<span style={{fontSize:11,color:"#ff4d6d",fontFamily:"'Barlow',sans-serif",background:"rgba(255,77,109,0.08)",border:"1px solid rgba(255,77,109,0.2)",borderRadius:4,padding:"3px 8px"}}>🔴 OUT: {poutTime}</span>
                    :null
                  }
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center",marginLeft:"auto",flexWrap:"wrap"}}>
                  {pinTime&&!poutTime&&<DurationTicker key={ticker} punchIn={pinTime}/>}
                  {pinTime&&poutTime&&(()=>{
                    // calc total hours worked
                    const parseT=(t)=>{
                      if(!t)return 0;
                      const [time,ampm]=t.split(" ");
                      const [h,m]=(time||"00:00").split(":").map(Number);
                      let hrs=h; if(ampm==="PM"&&h!==12)hrs+=12; if(ampm==="AM"&&h===12)hrs=0;
                      return hrs*60+m;
                    };
                    const diff=parseT(poutTime)-parseT(pinTime);
                    if(diff>0){
                      const dh=Math.floor(diff/60),dm=diff%60;
                      return <span className="duration">✅ {dh>0?`${dh}h `:""}${dm}m worked</span>;
                    }
                    return null;
                  })()}
                </div>
              </div>

              {/* Note row */}
              {editNote===emp.id
                ?<div style={{marginTop:8}}><textarea rows={2} placeholder="Add note..." value={note} onChange={e=>upd("notes",emp.id,e.target.value)} onBlur={()=>setEditNote(null)} autoFocus/></div>
                :<div style={{marginTop:6,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  {note&&<span style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif",fontStyle:"italic"}}>"{note}"</span>}
                  <button className="note-link" onClick={()=>setEditNote(emp.id)}>+ note</button>
                  <div style={{marginLeft:"auto"}}>
                    <button className="wa-btn" onClick={()=>{
                      const st=statuses[emp.id]||"Not Marked";
                      const pi=punchIn[emp.id]?"\nPunch In: "+punchIn[emp.id]:"";
                      const po=punchOut[emp.id]?"\nPunch Out: "+punchOut[emp.id]:"";
                      const nt=note?"\nNote: "+note:"";
                      const msg="Surya Gym 2.0 - Attendance\n"+fmtDate(date)+"\n\nEmployee: "+emp.name+"\nShift: "+emp.shift+"\nStatus: "+st+pi+po+nt+"\n\nSurya Gym 2.0";
                      openWA(emp.phone||"", msg);
                    }}>💬 WhatsApp</button>
                  </div>
                </div>
              }
            </div>
          );
        })
      }
      {!loading&&<div style={{display:"flex",justifyContent:"flex-end",marginTop:24}}>
        <button className={`save-btn${flash?" flashing":""}`} onClick={doSave} disabled={saving}>
          {saving?<><span className="spinner"></span>SAVING...</>:"SAVE & SYNC"}
        </button>
      </div>}
    </div>}

    {/* HISTORY TAB */}
    {tab==="history"&&<div>
      {allDates.length===0
        ?<div className="empty"><div style={{fontSize:48,marginBottom:12}}>📋</div><div style={{fontSize:18,letterSpacing:2}}>NO RECORDS YET</div></div>
        :allDates.map(d=>(
          <div key={d} className="hist-card" onClick={()=>{setDate(d);setTab("mark");}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:17,fontWeight:700}}>{fmtDate(d)}</div>
                <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif",marginTop:4}}>Tap to view &amp; edit</div>
              </div>
              <div style={{fontSize:11,background:"rgba(255,77,0,0.1)",color:"#ff8c00",border:"1px solid rgba(255,77,0,0.3)",borderRadius:4,padding:"4px 10px",letterSpacing:1}}>VIEW →</div>
            </div>
          </div>
        ))
      }
    </div>}

    {/* SUMMARY TAB */}
    {tab==="calendar"&&<CalendarTab allDates={allDates} staff={staff} gymId={activeGymId} onSelectDate={(d)=>{setDate(d);setTab("mark");}}/>}

    {tab==="payroll"&&<PayrollTab allDates={allDates} staff={staff} salaryConfig={salaryConfig} gymId={activeGymId} onSaveConfig={async(cfg)=>{await window._saveSalaryConfig(cfg,activeGymId);setSalaryConfig(cfg);showToast("✓ Salary config saved!");}}/>}

    {tab==="summary"&&<SummaryTab allDates={allDates} staff={staff} gymId={activeGymId}/>}

    {tab==="leave"&&<LeaveTab staff={staff} leaveReqs={leaveReqs} showToast={showToast} gymId={activeGymId} onApprove={async(req)=>{
      const updated={...req,status:"approved",updatedAt:new Date().toISOString()};
      await window._saveLeaveReq(req.id,updated,activeGymId);
      // Auto update attendance for approved leave dates
      req.dates.forEach(async(d)=>{
        const existing=await window._loadAttendance(d,activeGymId)||{statuses:{},shifts:Object.fromEntries(staff.map(e=>[e.id,e.shift])),notes:{},punchIn:{},punchOut:{}};

        existing.notes[req.empId]="Approved: "+req.reason;

      });
      showToast("✓ Leave approved & attendance updated!");
    }} onReject={async(req)=>{
      await window._saveLeaveReq(req.id,{...req,status:"rejected",updatedAt:new Date().toISOString()});
      showToast("✗ Leave rejected.");
    }}/>}

    {tab==="members"&&<MembersTab
      members={members} gymId={activeGymId} gymConfig={gymConfig} staff={staff}
      memberAttend={memberAttend} date={date} showToast={showToast}
      onSaveMember={async(id,d)=>await window._saveMember(id,d,activeGymId)}
      onDeleteMember={async(id)=>await window._deleteMember(id,activeGymId)}
      onSaveMemberAttend={async(date,d)=>await window._saveMemberAttend(date,d,activeGymId)}
      onSaveGymConfig={async(d)=>{await window._saveGymConfig(d,activeGymId);setGymConfig(d);showToast("✓ Settings saved!");}}
    />}

    {tab==="revenue"&&<RevenueTab members={members} gymConfig={gymConfig} gymId={activeGymId} gymName={gymList.find(g=>g.id===activeGymId)?.name||"Surya Gym 2.0"} onSaveGymConfig={async(d)=>{await window._saveGymConfig(d,activeGymId);setGymConfig(d);showToast("✓ Settings saved!");}}/>}

    {tab==="pt"&&<PTTab staff={staff} ptClients={ptClients} ptSessions={ptSessions} gymId={activeGymId} showToast={showToast}
      onSaveClient={async(id,d)=>await window._savePTClient(id,d,activeGymId)}
      onDeleteClient={async(id)=>await window._deletePTClient(id,activeGymId)}
      onSaveSession={async(id,d)=>await window._savePTSession(id,d,activeGymId)}
    />}

    {tab==="export"&&<ExportTab allDates={allDates} staff={staff} salaryConfig={salaryConfig} gymId={activeGymId} gymName={gymList.find(g=>g.id===activeGymId)?.name||"Surya Gym 2.0"}/>}

    {toast&&<div className="toast">{toast}</div>}
  </div>);
}

/* ── SUMMARY TAB ── */
function SummaryTab({allDates,staff,gymId}){
  const [allData,setAllData]=useState({});
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!allDates.length){setLoading(false);return;}
    Promise.all(allDates.map(d=>window._loadAttendance(d,gymId||'gym_default').then(data=>[d,data]))).then(results=>{
      const map={};results.forEach(([d,data])=>{if(data)map[d]=data;});
      setAllData(map);setLoading(false);
    });
  },[allDates]);

  if(loading)return<div style={{textAlign:"center",padding:"40px 0"}}><span className="spinner"></span><span style={{color:"#6b7280",fontFamily:"'Barlow',sans-serif",fontSize:13}}>Loading...</span></div>;

  return<div>
    <div style={{marginBottom:16,fontSize:12,color:"#4b5563",fontFamily:"'Barlow',sans-serif",letterSpacing:1}}>INDIVIDUAL OVERVIEW — ALL RECORDED DAYS</div>
    {staff.map((emp,i)=>{
      let p=0,a=0,h=0,l=0,total=0;
      let totalMinsWorked=0;
      Object.values(allData).forEach(data=>{
        const s=(data?.statuses||{})[emp.id];
        const pin=(data?.punchIn||{})[emp.id];
        const pout=(data?.punchOut||{})[emp.id];
        if(s){total++;if(s==="Present")p++;else if(s==="Absent")a++;else if(s==="Half Day")h++;else if(s==="Leave")l++;}
        if(pin&&pout){
          const parseT=(t)=>{const[time,ampm]=t.split(" ");const[hr,mn]=(time||"00:00").split(":").map(Number);let hrs=hr;if(ampm==="PM"&&hr!==12)hrs+=12;if(ampm==="AM"&&hr===12)hrs=0;return hrs*60+mn;};
          const diff=parseT(pout)-parseT(pin);
          if(diff>0)totalMinsWorked+=diff;
        }
      });
      const rate=total?Math.round(p/total*100):null;
      const avgHrs=p>0?Math.round(totalMinsWorked/p):0;
      return(
        <div key={emp.id} style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"14px 18px",marginBottom:8,animation:"slide-in 0.3s ease both",animationDelay:`${i*0.06}s`}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:40,height:40,borderRadius:8,flexShrink:0,background:"linear-gradient(135deg,rgba(255,77,0,0.2),rgba(255,140,0,0.2))",border:"1.5px solid rgba(255,77,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#ff8c00"}}>{emp.avatar||makeAvatar(emp.name)}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:700}}>{emp.name}</div>
              <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>{emp.role} · {emp.shift}</div>
              <div style={{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"}}>
                {[["P",p,"#00ff87"],["A",a,"#ff4d6d"],["H",h,"#ffd60a"],["L",l,"#a78bfa"]].map(([lbl,val,c])=>(
                  <span key={lbl} style={{fontSize:11,fontFamily:"'Barlow',sans-serif"}}><span style={{color:c,fontWeight:700}}>{val}</span> <span style={{color:"#4b5563"}}>{lbl}</span></span>
                ))}
                <span style={{fontSize:11,color:"#4b5563",fontFamily:"'Barlow',sans-serif"}}>/ {total} days</span>
                {avgHrs>0&&<span style={{fontSize:11,color:"#ffd60a",fontFamily:"'Barlow',sans-serif"}}>⏱ avg {Math.floor(avgHrs/60)}h{avgHrs%60>0?` ${avgHrs%60}m`:""}/day</span>}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              {rate!==null
                ?<><div style={{fontSize:26,fontWeight:900,color:rate>=80?"#00ff87":rate>=60?"#ffd60a":"#ff4d6d"}}>{rate}%</div><div style={{fontSize:9,color:"#4b5563",letterSpacing:1}}>ATTEND RATE</div></>
                :<div style={{fontSize:12,color:"#374151",fontFamily:"'Barlow',sans-serif"}}>No data</div>
              }
            </div>
          </div>
        </div>
      );
    })}
  </div>;
}

/* ── CALENDAR TAB ── */
function CalendarTab({allDates,staff,onSelectDate,gymId}){
  const [calData,setCalData]=useState({});
  const [loadingCal,setLoadingCal]=useState(false);
  const now=new Date();
  const [viewYear,setViewYear]=useState(now.getFullYear());
  const [viewMonth,setViewMonth]=useState(now.getMonth());
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  useEffect(()=>{
    const ms=String(viewYear)+"-"+String(viewMonth+1).padStart(2,"0");
    const mDates=allDates.filter(d=>d.startsWith(ms));
    if(!mDates.length){setCalData({});return;}
    setLoadingCal(true);
    Promise.all(mDates.map(d=>window._loadAttendance(d,gymId||'gym_default').then(data=>[d,data]))).then(results=>{
      const map={};results.forEach(([d,data])=>{if(data)map[d]=data;});
      setCalData(map);setLoadingCal(false);
    });
  },[viewYear,viewMonth,allDates]);

  const prevMonth=()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);};
  const nextMonth=()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);};
  const todayStr=new Date().toISOString().split("T")[0];
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const getDateStr=d=>viewYear+"-"+String(viewMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

  const getDots=dateStr=>{
    const data=calData[dateStr];
    if(!data||!data.statuses)return[];
    return staff.map(emp=>{
      const s=data.statuses[emp.id];
      if(s==="Present")return"#00ff87";
      if(s==="Absent")return"#ff4d6d";
      if(s==="Half Day")return"#ffd60a";
      if(s==="Leave")return"#a78bfa";
      return null;
    }).filter(Boolean);
  };

  const getSummary=dateStr=>{
    const data=calData[dateStr];
    if(!data||!data.statuses)return null;
    const vals=Object.values(data.statuses);
    const p=vals.filter(s=>s==="Present").length;
    const total=staff.length;
    return{p,total,pct:total?Math.round(p/total*100):0};
  };

  return(
    <div>
      {/* Month Nav */}
      <div className="cal-header">
        <button className="cal-nav" onClick={prevMonth}>← PREV</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,letterSpacing:2}}>{MONTHS[viewMonth].toUpperCase()}</div>
          <div style={{fontSize:13,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>{viewYear}</div>
        </div>
        <button className="cal-nav" onClick={nextMonth}>NEXT →</button>
      </div>

      {/* Weekday headers */}
      <div className="cal-grid">
        {DAYS.map(d=><div key={d} className="cal-weekday">{d}</div>)}
      </div>

      {/* Days */}
      {loadingCal
        ?<div style={{textAlign:"center",padding:"30px 0"}}><span className="spinner"></span><span style={{color:"#6b7280",fontFamily:"'Barlow',sans-serif",fontSize:13}}>Loading...</span></div>
        :<div className="cal-grid">
          {cells.map((d,i)=>{
            if(!d)return<div key={"e"+i} className="cal-day empty"></div>;
            const dateStr=getDateStr(d);
            const isToday=dateStr===todayStr;
            const hasSaved=allDates.includes(dateStr);
            const dots=getDots(dateStr);
            const summary=getSummary(dateStr);
            const isFuture=dateStr>todayStr;
            let bg="rgba(255,255,255,0.02)";
            if(hasSaved&&summary){
              if(summary.pct>=80)bg="rgba(0,255,135,0.06)";
              else if(summary.pct>=50)bg="rgba(255,214,10,0.06)";
              else bg="rgba(255,77,109,0.06)";
            }
            return(
              <div key={d} className={"cal-day"+(isToday?" today":"")}
                onClick={()=>!isFuture&&onSelectDate(dateStr)}
                style={{opacity:isFuture?0.3:1,cursor:isFuture?"not-allowed":"pointer",background:bg}}>
                <div className="cal-day-num" style={{color:isToday?"#ff4d00":hasSaved?"#e8edf2":"#4b5563"}}>{d}</div>
                {summary&&<div style={{fontSize:9,color:summary.pct>=80?"#00ff87":summary.pct>=50?"#ffd60a":"#ff4d6d",fontFamily:"'Barlow',sans-serif",fontWeight:700}}>{summary.pct}%</div>}
                {dots.length>0&&<div className="cal-dots">{dots.slice(0,4).map((c,ci)=><div key={ci} className="cal-dot" style={{background:c}}/>)}</div>}
              </div>
            );
          })}
        </div>
      }

      {/* Legend */}
      <div className="cal-legend">
        {[["#00ff87","Present"],["#ff4d6d","Absent"],["#ffd60a","Half Day"],["#a78bfa","Leave"]].map(([c,l])=>(
          <div key={l} className="cal-legend-item"><div className="cal-dot" style={{background:c,width:8,height:8}}></div>{l}</div>
        ))}
        <div style={{marginLeft:"auto",fontSize:10,color:"#4b5563",fontFamily:"'Barlow',sans-serif"}}>Tap day to open</div>
      </div>

      {/* Monthly stats */}
      {Object.keys(calData).length>0&&(()=>{
        let totalPresent=0,totalDays=0;
        Object.values(calData).forEach(data=>{
          if(data&&data.statuses){totalDays++;totalPresent+=Object.values(data.statuses).filter(s=>s==="Present").length;}
        });
        const avg=totalDays>0?Math.round(totalPresent/(totalDays*staff.length)*100):0;
        return(
          <div style={{marginTop:16,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:11,color:"#4b5563",letterSpacing:2,fontFamily:"'Barlow',sans-serif"}}>MONTHLY OVERVIEW</div>
              <div style={{fontSize:13,color:"#9ca3af",fontFamily:"'Barlow',sans-serif",marginTop:4}}>{totalDays} days recorded · {MONTHS[viewMonth]}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:32,fontWeight:900,color:avg>=80?"#00ff87":avg>=60?"#ffd60a":"#ff4d6d"}}>{avg}%</div>
              <div style={{fontSize:9,color:"#4b5563",letterSpacing:1}}>AVG ATTENDANCE</div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ── PAYROLL TAB ── */
function PayrollTab({allDates,staff,salaryConfig,onSaveConfig,gymId}){
  const now=new Date();
  const [viewYear,setViewYear]=useState(now.getFullYear());
  const [viewMonth,setViewMonth]=useState(now.getMonth());
  const [allData,setAllData]=useState({});
  const [loading,setLoading]=useState(false);
  const [payStatus,setPayStatus]=useState({});
  const [workingDays,setWorkingDays]=useState(26);
  const [editSalary,setEditSalary]=useState(false);
  const [localSalaries,setLocalSalaries]=useState({});
  const [savingCfg,setSavingCfg]=useState(false);
  const [savingPay,setSavingPay]=useState(false);
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

  const monthKey=`${viewYear}-${String(viewMonth+1).padStart(2,"0")}`;

  // Load attendance data for selected month
  useEffect(()=>{
    const mDates=allDates.filter(d=>d.startsWith(monthKey));
    if(!mDates.length){setAllData({});return;}
    setLoading(true);
    Promise.all(mDates.map(d=>window._loadAttendance(d,gymId||'gym_default').then(data=>[d,data]))).then(results=>{
      const map={};results.forEach(([d,data])=>{if(data)map[d]=data;});
      setAllData(map);setLoading(false);
    });
  },[viewYear,viewMonth,allDates]);

  // Load payroll status for month
  useEffect(()=>{
    window._loadPayroll(monthKey,gymId).then(data=>{
      if(data){setPayStatus(data.status||{});setWorkingDays(data.workingDays||26);}
      else{setPayStatus({});setWorkingDays(26);}
    });
  },[monthKey]);

  // Sync local salaries from config
  useEffect(()=>{
    const init={};
    staff.forEach(e=>{init[e.id]=salaryConfig[e.id]||"";});
    setLocalSalaries(init);
  },[salaryConfig,staff]);

  const prevMonth=()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);};
  const nextMonth=()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);};

  // Calculate stats per employee for this month
  const calcStats=(empId)=>{
    let present=0,absent=0,halfDay=0,leave=0,totalMins=0;
    Object.values(allData).forEach(data=>{
      const s=(data?.statuses||{})[empId];
      const pin=(data?.punchIn||{})[empId];
      const pout=(data?.punchOut||{})[empId];
      if(s==="Present"||s==="Half Day")present++;
      if(s==="Absent")absent++;
      if(s==="Half Day")halfDay++;
      if(s==="Leave")leave++;
      if(pin&&pout){
        const parseT=t=>{const[time,ampm]=t.split(" ");const[h,m]=(time||"00:00").split(":").map(Number);let hr=h;if(ampm==="PM"&&h!==12)hr+=12;if(ampm==="AM"&&h===12)hr=0;return hr*60+m;};
        const d=parseT(pout)-parseT(pin);if(d>0)totalMins+=d;
      }
    });
    const monthlySalary=parseFloat(salaryConfig[empId])||0;
    const perDay=workingDays>0?monthlySalary/workingDays:0;
    // Half day counts as full present per user's preference
    const payableDays=present; // present already includes half days counted as full
    const absentDeduction=absent*perDay;
    const netSalary=Math.max(0,monthlySalary-absentDeduction);
    const hrs=Math.floor(totalMins/60),mins=totalMins%60;
    return{present,absent,halfDay,leave,monthlySalary,perDay,absentDeduction,netSalary,totalMins,hrs,mins,payableDays};
  };

  const togglePaid=async(empId)=>{
    const newStatus={...payStatus,[empId]:payStatus[empId]==="paid"?"pending":"paid"};
    setPayStatus(newStatus);
    await window._savePayroll(monthKey,{status:newStatus,workingDays,updatedAt:new Date().toISOString()},gymId);
  };

  const savePayroll=async()=>{
    setSavingPay(true);
    await window._savePayroll(monthKey,{status:payStatus,workingDays,updatedAt:new Date().toISOString()},gymId);
    setSavingPay(false);
  };

  const saveSalaries=async()=>{
    setSavingCfg(true);
    await onSaveConfig(localSalaries);
    setEditSalary(false);setSavingCfg(false);
  };

  // Total payroll for month
  const totalNet=staff.reduce((sum,e)=>sum+calcStats(e.id).netSalary,0);
  const totalPaid=staff.filter(e=>payStatus[e.id]==="paid").reduce((sum,e)=>sum+calcStats(e.id).netSalary,0);
  const totalPending=totalNet-totalPaid;
  const recordedDays=Object.keys(allData).length;

  return(
    <div>
      {/* Month selector */}
      <div className="month-selector">
        <button className="month-btn" onClick={prevMonth}>← PREV</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:900,letterSpacing:2}}>{MONTHS[viewMonth].toUpperCase()} {viewYear}</div>
          <div style={{fontSize:11,color:"#4b5563",fontFamily:"'Barlow',sans-serif"}}>{recordedDays} days recorded this month</div>
        </div>
        <button className="month-btn" onClick={nextMonth}>NEXT →</button>
      </div>

      {/* Working days + salary config row */}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"8px 14px"}}>
          <span style={{fontSize:12,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>Working Days:</span>
          <input className="working-days-input" type="number" min="1" max="31" value={workingDays} onChange={e=>setWorkingDays(Number(e.target.value)||26)}/>
        </div>
        <button onClick={()=>setEditSalary(e=>!e)} style={{cursor:"pointer",background:editSalary?"rgba(255,140,0,0.15)":"rgba(255,255,255,0.04)",border:`1.5px solid ${editSalary?"#ff8c00":"rgba(255,255,255,0.1)"}`,borderRadius:8,padding:"8px 14px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,letterSpacing:1,color:editSalary?"#ff8c00":"#6b7280",cursor:"pointer"}}>
          ⚙️ {editSalary?"HIDE":"SET"} SALARIES
        </button>
        {editSalary&&<button className="save-btn" style={{padding:"8px 18px",fontSize:13}} onClick={saveSalaries} disabled={savingCfg}>
          {savingCfg?"SAVING...":"SAVE SALARIES"}
        </button>}
      </div>

      {/* Salary config editor */}
      {editSalary&&(
        <div style={{background:"rgba(255,140,0,0.05)",border:"1px solid rgba(255,140,0,0.2)",borderRadius:10,padding:"14px 18px",marginBottom:16}}>
          <div style={{fontSize:11,color:"#ff8c00",letterSpacing:2,marginBottom:12,fontFamily:"'Barlow',sans-serif"}}>SET MONTHLY SALARY (₹)</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {staff.map(emp=>(
              <div key={emp.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div>
                  <div style={{fontSize:14,fontWeight:700}}>{emp.name}</div>
                  <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>{emp.role}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:16,color:"#ff8c00",fontWeight:700}}>₹</span>
                  <input className="salary-input" type="number" placeholder="0" value={localSalaries[emp.id]||""} onChange={e=>setLocalSalaries(p=>({...p,[emp.id]:e.target.value}))}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Summary totals */}
      <div className="total-box" style={{marginBottom:16}}>
        <div style={{fontSize:11,color:"#ff8c00",letterSpacing:2,marginBottom:12,fontFamily:"'Barlow',sans-serif"}}>MONTHLY PAYROLL SUMMARY</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {[["Total Payroll","₹"+totalNet.toLocaleString("en-IN"),"#e8edf2"],["Paid","₹"+totalPaid.toLocaleString("en-IN"),"#00ff87"],["Pending","₹"+totalPending.toLocaleString("en-IN"),"#ff4d6d"]].map(([l,v,c])=>(
            <div key={l} style={{flex:1,minWidth:80,textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"10px 6px"}}>
              <div style={{fontSize:18,fontWeight:900,color:c}}>{v}</div>
              <div style={{fontSize:9,color:"#4b5563",letterSpacing:1,fontFamily:"'Barlow',sans-serif",marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Per employee payroll cards */}
      {loading
        ?<div style={{textAlign:"center",padding:"30px 0"}}><span className="spinner"></span><span style={{color:"#6b7280",fontFamily:"'Barlow',sans-serif",fontSize:13}}>Calculating...</span></div>
        :staff.map((emp,i)=>{
          const s=calcStats(emp.id);
          const isPaid=payStatus[emp.id]==="paid";

/* ── LEAVE TAB ── */
function LeaveTab({staff,leaveReqs,showToast,onApprove,onReject,restrictToEmp,gymId}){
  const [subTab,setSubTab]=useState("requests"); // requests | apply
  const [empId,setEmpId]=useState(restrictToEmp||staff[0]?.id||"");
  const [leaveType,setLeaveType]=useState("Sick Leave");
  const [reason,setReason]=useState("");
  const [fromDate,setFromDate]=useState(today());
  const [toDate,setToDate]=useState(today());
  const [submitting,setSubmitting]=useState(false);
  const [filterEmp,setFilterEmp]=useState("all");
  const [filterStatus,setFilterStatus]=useState("all");

  const LEAVE_TYPES=["Sick Leave","Personal Leave","Emergency","Festival","Other"];

  const pendingCount=leaveReqs.filter(r=>r.status==="pending").length;

  // Build dates array from from-to range
  const buildDates=(from,to)=>{
    const dates=[]; let cur=new Date(from);
    const end=new Date(to);
    while(cur<=end){dates.push(cur.toISOString().split("T")[0]);cur.setDate(cur.getDate()+1);}
    return dates;
  };

  const submitLeave=async()=>{
    if(!empId||!reason.trim()){showToast("❌ Fill all fields!");return;}
    if(fromDate>toDate){showToast("❌ From date must be before To date!");return;}
    setSubmitting(true);
    const dates=buildDates(fromDate,toDate);
    const id="leave_"+Date.now();
    const req={id,empId,empName:staff.find(e=>e.id===empId)?.name||"",leaveType,reason:reason.trim(),dates,fromDate,toDate,status:"pending",submittedAt:new Date().toISOString()};
    await window._saveLeaveReq(id,req,gymId||'gym_default');
    setReason("");setFromDate(today());setToDate(today());
    setSubmitting(false);
    setSubTab("requests");
    showToast("✓ Leave request submitted!");
  };

  // Filter requests
  const filtered=leaveReqs.filter(r=>{
    if(filterEmp!=="all"&&r.empId!==filterEmp)return false;
    if(filterStatus!=="all"&&r.status!==filterStatus)return false;
    return true;
  }).sort((a,b)=>b.submittedAt?.localeCompare(a.submittedAt||"")||0);

  const fmtDates=(dates)=>{
    if(!dates||!dates.length)return"—";
    if(dates.length===1)return fmtDate(dates[0]);
    return `${fmtDate(dates[0])} → ${fmtDate(dates[dates.length-1])} (${dates.length} days)`;
  };

  return(
    <div>
      {/* Sub tabs */}
      <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.07)",marginBottom:20}}>
        <button className={`leave-tab-btn${subTab==="requests"?" active":""}`} onClick={()=>setSubTab("requests")}>
          📋 ALL REQUESTS {pendingCount>0&&<span className="pending-badge">{pendingCount}</span>}
        </button>
        <button className={`leave-tab-btn${subTab==="apply"?" active":""}`} onClick={()=>setSubTab("apply")}>
          ✍️ APPLY LEAVE
        </button>
      </div>

      {/* APPLY LEAVE FORM */}
      {subTab==="apply"&&(
        <div style={{background:"rgba(167,139,250,0.04)",border:"1px solid rgba(167,139,250,0.15)",borderRadius:12,padding:"20px"}}>
          <div style={{fontSize:16,fontWeight:900,letterSpacing:2,color:"#a78bfa",marginBottom:18}}>NEW LEAVE REQUEST</div>

          {!restrictToEmp&&<div className="field-group">
            <div className="field-label">Employee</div>
            <select value={empId} onChange={e=>setEmpId(e.target.value)} style={{color:"#e8edf2"}}>
              {staff.map(e=><option key={e.id} value={e.id}>{e.name} — {e.role}</option>)}
            </select>
          </div>}

          <div className="field-group">
            <div className="field-label">Leave Type</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
              {LEAVE_TYPES.map(t=>(
                <button key={t} className={`leave-type-btn${leaveType===t?" active":""}`} onClick={()=>setLeaveType(t)}>{t}</button>
              ))}
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div className="field-group">
              <div className="field-label">From Date</div>
              <input type="date" value={fromDate} onChange={e=>{setFromDate(e.target.value);if(e.target.value>toDate)setToDate(e.target.value);}}/>
            </div>
            <div className="field-group">
              <div className="field-label">To Date</div>
              <input type="date" value={toDate} min={fromDate} onChange={e=>setToDate(e.target.value)}/>
            </div>
          </div>

          {fromDate&&toDate&&fromDate<=toDate&&(
            <div style={{marginBottom:12,fontSize:12,color:"#a78bfa",fontFamily:"'Barlow',sans-serif",background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:6,padding:"6px 12px"}}>
              📅 {buildDates(fromDate,toDate).length} day(s) leave
            </div>
          )}

          <div className="field-group">
            <div className="field-label">Reason</div>
            <textarea rows={3} placeholder="Reason for leave..." value={reason} onChange={e=>setReason(e.target.value)}/>
          </div>

          <button className="save-btn" style={{width:"100%",marginTop:4}} onClick={submitLeave} disabled={submitting}>
            {submitting?<><span className="spinner"></span>SUBMITTING...</>:"SUBMIT LEAVE REQUEST"}
          </button>
        </div>
      )}

      {/* REQUESTS LIST */}
      {subTab==="requests"&&(
        <div>
          {/* Filters */}
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <select value={filterEmp} onChange={e=>setFilterEmp(e.target.value)} style={{flex:1,minWidth:140,color:"#e8edf2"}}>

            </select>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{flex:1,minWidth:120,color:"#e8edf2"}}>
              <option value="all">All Status</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>

          {filtered.length===0
            ?<div className="empty"><div style={{fontSize:42,marginBottom:12}}>🏖</div><div style={{fontSize:16,letterSpacing:2}}>NO LEAVE REQUESTS</div></div>
            :filtered.map((req,i)=>{
              const emp=staff.find(e=>e.id===req.empId);
              return(
                <div key={req.id} className="leave-card" style={{animationDelay:`${i*0.05}s`,borderColor:req.status==="approved"?"rgba(0,255,135,0.2)":req.status==="rejected"?"rgba(255,77,109,0.2)":"rgba(255,214,10,0.2)"}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,rgba(167,139,250,0.2),rgba(167,139,250,0.1))",border:"1.5px solid rgba(167,139,250,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#a78bfa",flexShrink:0}}>
                        {emp?emp.avatar||makeAvatar(emp.name):"?"}
                      </div>
                      <div>
                        <div style={{fontSize:15,fontWeight:700}}>{req.empName}</div>
                        <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif"}}>{req.leaveType}</div>
                      </div>
                    </div>
                    <span className={`status-pill ${req.status==="pending"?"pill-pending":req.status==="approved"?"pill-approved":"pill-rejected"}`}>
                      {req.status==="pending"?"⏳ PENDING":req.status==="approved"?"✓ APPROVED":"✗ REJECTED"}
                    </span>
                  </div>

                  <div style={{fontSize:12,color:"#9ca3af",fontFamily:"'Barlow',sans-serif",marginBottom:8,fontStyle:"italic"}}>"{req.reason}"</div>

                  <div style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow',sans-serif",marginBottom:req.status==="pending"?12:0}}>
                    📅 {fmtDates(req.dates)}
                  </div>

                  {req.status==="pending"&&!restrictToEmp&&(
                    <div style={{display:"flex",gap:8,marginTop:8}}>
                      <button className="approve-btn" style={{flex:1}} onClick={()=>onApprove(req)}>✓ APPROVE</button>
                      <button className="reject-btn" style={{flex:1}} onClick={()=>onReject(req)}>✗ REJECT</button>
                    </div>
                  )}

                  {req.updatedAt&&req.status!=="pending"&&(
                    <div style={{fontSize:10,color:"#374151",fontFamily:"'Barlow',sans-serif",marginTop:6}}>
                      {req.status==="approved"?"✓ Approved":"✗ Rejected"} · {new Date(req.updatedAt).toLocaleDateString("en-IN")}
                    </div>
                  )}
                </div>
              );
            })
          }
        </div>
      )}
    </div>
  );
}




const PACKAGES = [
  {name:"Monthly",   days:30,  cls:"pkg-monthly"},
  {name:"Quarterly", days:90,  cls:"pkg-quarterly"},
  {name:"Half-Yearly",days:180,cls:"pkg-halfyearly"},
  {name:"Yearly",    days:365, cls:"pkg-yearly"},
  {name:"Custom",    days:0,   cls:"pkg-custom"},
];

function daysLeft(expiryDate){
  if(!expiryDate)return null;
  const diff=Math.ceil((new Date(expiryDate+"T23:59:59")-new Date())/(1000*60*60*24));
  return diff;
}

function memberStatus(m){
  const d=daysLeft(m.expiryDate);
  if(d===null)return "unknown";
  if(d<0)return "expired";
  if(d<=7)return "expiring";
  return "active";
}

function pkgClass(pkgName){
  const p=PACKAGES.find(p=>p.name===pkgName);
  return p?p.cls:"pkg-custom";
}

function calcExpiry(startDate,pkgName,customDays){
  const p=PACKAGES.find(p=>p.name===pkgName);
  const days=pkgName==="Custom"?Number(customDays||30):(p?.days||30);
  const d=new Date(startDate+"T00:00:00");
  d.setDate(d.getDate()+days-1);
  return d.toISOString().split("T")[0];
}

  const [editMode,  setEditMode] = useState(false);
  const [announce,  setAnnounce] = useState("");

    if(memberAttend)setCheckedIn(memberAttend.checked||[]);
  },[memberAttend]);

  const resetForm=()=>setForm({name:"",phone:"",pin:"",dob:"",goal:"",package:"Monthly",startDate:today(),customDays:30,feeAmount:"",feePaid:false,notes:"",trainerId:""});

  const saveMember=async()=>{
    if(!form.name.trim()){showToast("Enter member name!");return;}

    setSaving(true);
    const id=editMode?selMember.id:"mem_"+Date.now();
